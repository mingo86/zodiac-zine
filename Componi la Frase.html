    $("scoreFill").style.width=(r.score*20)+"%";
    $("verdict").textContent=r.verdict||r.sint||"";
    $("dyn").innerHTML=`<b>${u.uni}</b> ${cap(r.unisce)}. <b>${u.sco}</b> ${cap(r.scotta)}.`;
    $("advice").innerHTML=" "+(r.advice||"");
    $("result").style.display="block";
  }

  function applyLang(){
    const L=langOf(); if(window.ZWIRE) window.ZWIRE.activate(L);
    const Z=window.ZODIAC, u=UI[L]||UI.it, acts=ACTIONS[L]||ACTIONS.it;
    $("ksuper").textContent=u.ksuper; $("hsub").textContent=u.hsub; $("panelTitle").textContent=u.panel;
    $("soWord").textContent=u.so; $("advLab").textContent=u.advLab; $("foot").innerHTML=u.foot;
    document.querySelectorAll(".pill[data-k]").forEach(p=>{ if(u.nav[p.dataset.k]) p.textContent=u.nav[p.dataset.k]; });
    // dropdowns con nomi segni tradotti (conserva selezione)
    const opts=Z.SIGNS.map(s=>`<option value="${s.k}">${s.g} ${s.n}</option>`).join("");
    const sv=$("selfSign").value||'toro', ov=$("otherSign").value||'capricorno', av=$("action").value||'1';
    $("selfSign").innerHTML=opts; $("otherSign").innerHTML=opts;
    $("selfSign").value=sv; $("otherSign").value=ov;
    $("action").innerHTML=acts.map((a,i)=>`<option value="${i}">${a.opt}</option>`).join("");
    $("action").value=av;
    document.querySelectorAll(".exbtn").forEach((b,i)=>{ if(u.ex[i]) b.textContent=u.ex[i]; });
    document.documentElement.lang=L;
    run();
  }

  if(window.ZI18N) window.ZI18N.mount($("langPick"));
  $("selfSign").onchange=$("otherSign").onchange=$("action").onchange=run;
  document.querySelectorAll(".exbtn").forEach(b=>b.onclick=()=>{
    $("selfSign").value=b.dataset.self; $("action").value=b.dataset.act; $("otherSign").value=b.dataset.other; run();
    $("result").scrollIntoView({behavior:"smooth"});
  });
  window.addEventListener('zlangchange', applyLang);
  applyLang();
})();
</script>
</body>
</html>
