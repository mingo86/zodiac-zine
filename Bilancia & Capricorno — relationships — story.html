<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Zodiac -- Bilancia & Capricorno -- story</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Bangers&family=Baloo+2:wght@500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"><style>
:root{--ink:#15110d;--paper:#fff6e3;--red:#ec2e36}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{background:#241a3e;min-height:100vh;display:flex;flex-direction:column;align-items:center;gap:12px;padding:18px 10px 40px;font-family:'Baloo 2',system-ui,sans-serif}
.hint{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:1px;color:#9c8fc8;text-align:center;max-width:400px}
.controls button{font-family:'Space Mono',monospace;font-size:12px;color:#241a3e;background:#ffd23f;border:2px solid #15110d;border-radius:8px;padding:5px 12px;cursor:pointer;box-shadow:2px 2px 0 #15110d}
.card{position:relative;width:min(360px,92vw);aspect-ratio:9/16;border-radius:22px;overflow:hidden;background:#fff0b3;border:6px solid var(--ink);box-shadow:0 14px 0 rgba(0,0,0,.45)}
.card::before{content:"";position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(circle,rgba(0,0,0,.05) 1.5px,transparent 1.7px);background-size:20px 20px}
.head{position:absolute;top:5%;left:0;right:0;text-align:center;z-index:6;opacity:0;transform:translateY(-12px) scale(.92);transition:opacity .45s,transform .5s cubic-bezier(.34,1.56,.64,1)}
.head.in{opacity:1;transform:translateY(0) scale(1)}
.signname{font-family:'Bangers',cursive;font-size:23px;white-space:nowrap;line-height:.9;letter-spacing:1px;-webkit-text-stroke:1.5px var(--ink);text-shadow:2px 2px 0 var(--ink)}
.sub{font-family:'Baloo 2';font-weight:700;font-style:italic;font-size:12px;color:#6b6356;margin-top:1px}
.mw{position:absolute;z-index:3;opacity:0;transform:scale(.55);transition:opacity .55s,transform .6s cubic-bezier(.34,1.7,.5,1)}
.mw.in{opacity:1;transform:scale(1)}
.mi{animation:none}.mi.bob{animation:bob 3.2s ease-in-out infinite}
.mi svg{display:block;width:100%;height:auto;filter:drop-shadow(0 8px 8px rgba(0,0,0,.28))}
.mw .zpup{transition:transform .55s cubic-bezier(.4,1.3,.5,1)}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3%)}}
.box{position:absolute;z-index:4;font-family:'Baloo 2';font-weight:700;font-size:clamp(9px,3vw,13px);line-height:1.1;color:var(--ink);border:3px solid var(--ink);border-radius:11px;padding:6px 8px;box-shadow:3px 3px 0 var(--ink);opacity:0;transform:scale(.4);transition:opacity .4s,transform .5s cubic-bezier(.34,1.7,.5,1),box-shadow .42s,filter .42s;filter:saturate(.9)}
.box.L{text-align:right}.box.R{text-align:left}.box.C{left:50%;text-align:center;transform:translateX(-50%) scale(.4)}
.box.a{background:#ffe08a}.box.b{background:#a9e0bf}.box.s{background:#fff0b3}
.box.in{opacity:1;transform:scale(1)}.box.C.in{opacity:1;transform:translateX(-50%) scale(1)}
.box.hot{transform:scale(1.12);box-shadow:7px 7px 0 var(--ink);filter:none;z-index:5}.box.C.hot{transform:translateX(-50%) scale(1.12)}
.ins{position:absolute;left:5%;right:5%;bottom:4%;z-index:6;display:flex;align-items:center;gap:10px;background:var(--paper);border:4px solid var(--ink);border-radius:14px;padding:10px 13px;box-shadow:5px 5px 0 var(--ink);opacity:0;transform:scale(.85);transition:opacity .4s,transform .45s cubic-bezier(.34,1.56,.64,1)}
.ins.in{opacity:1;transform:scale(1)}
.ins .tag{font-family:'Bangers',cursive;letter-spacing:.03em;text-transform:uppercase;font-size:clamp(14px,4.4vw,18px);color:#fff;background:var(--red);border:2px solid var(--ink);border-radius:9px;padding:4px 12px;box-shadow:2px 2px 0 var(--ink);transform:rotate(-1.5deg);white-space:nowrap}
.ins .mt{font-family:'Baloo 2';font-weight:700;font-style:italic;font-size:clamp(11px,3.6vw,16px);color:var(--ink);min-height:1.1em}
.ins .mt.typing{border-right:2px solid var(--ink);animation:caret .75s step-end infinite}
@keyframes caret{50%{border-color:transparent}}
</style></head><body>
<div class="hint">Bilancia & Capricorno -- STORY 9:16 -- animata</div>
<div class="controls"><button id="replay">replay</button></div>
<div class="card" id="card">
 <div class="head" id="head"><div class="signname"><span style="color:#caa200">BILANCIA</span> <span style="color:#15110d">&amp;</span> <span style="color:#36b06a">CAPRICORNO</span></div><div class="sub">in relationships...</div></div>
 <div class="mw" id="mw1" style="left:34%;top:37%;width:16%"><div class="mi" id="mi1"></div></div>
 <div class="mw" id="mw2" style="left:50%;top:37%;width:16%"><div class="mi" id="mi2"></div></div>
 <div class="ins" id="ins"><span class="tag">INSIEME</span><span class="mt" id="mt">Sogno + concretezza: si completano.</span></div>
</div>
<script src="coppie/mascots.js"></script>
<script>
(function(){
 var card=document.getElementById('card'),head=document.getElementById('head'),ins=document.getElementById('ins'),mt=document.getElementById('mt');
 var mw1=document.getElementById('mw1'),mw2=document.getElementById('mw2'),mi1=document.getElementById('mi1'),mi2=document.getElementById('mi2');
 var MT=mt.textContent;
 mi1.innerHTML=window.MASCOT({k:'bilancia',el:'aria'},'#f5b700','stampa',1,'happy','f');
 mi2.innerHTML=window.MASCOT({k:'capricorno',el:'terra'},'#36b06a','stampa',1,'happy','m');
 function fitName(){var sn=document.querySelector('.signname');if(!sn)return;var cw=card.clientWidth*0.86,f=23;sn.style.fontSize=f+'px';while(sn.scrollWidth>cw&&f>14){f--;sn.style.fontSize=f+'px';var sh=Math.max(1,Math.round(f*0.09));sn.style.textShadow=sh+'px '+sh+'px 0 #15110d';}}
 if(document.fonts&&document.fonts.ready)document.fonts.ready.then(fitName);setTimeout(fitName,400);
 var BOXES=[{"t":"Opposti che si attraggono","cls":"C","top":19,"w":54,"gx":0,"gy":-4,"c":"s"},{"t":"Cerca armonia","cls":"L","top":29,"w":44,"gx":-4,"gy":-3,"left":3,"c":"a"},{"t":"Ama socializzare","cls":"L","top":46,"w":30,"gx":-5,"gy":0,"left":3,"c":"a"},{"t":"Diplomatica ma indecisa","cls":"L","top":62,"w":44,"gx":-4,"gy":3,"left":3,"c":"a"},{"t":"Cerca stabilita","cls":"R","top":29,"w":44,"gx":4,"gy":-3,"right":3,"c":"b"},{"t":"Poche persone vere","cls":"R","top":46,"w":30,"gx":5,"gy":0,"right":3,"c":"b"},{"t":"Pratico e deciso","cls":"R","top":62,"w":44,"gx":4,"gy":3,"right":3,"c":"b"},{"t":"Un equilibrio da costruire","cls":"C","top":75,"w":54,"gx":0,"gy":4,"c":"s"}];
 var all=[];BOXES.forEach(function(p){var d=document.createElement('div');d.className='box '+p.cls+' '+p.c;d.style.top=p.top+'%';d.style.width=p.w+'%';if(p.left!=null)d.style.left=p.left+'%';if(p.right!=null)d.style.right=p.right+'%';d.textContent=p.t;d.dataset.gx=p.gx;d.dataset.gy=p.gy;card.appendChild(d);all.push(d);});
 var AP=[1,0,4,5,6,7,3,2].map(function(i){return all[i];});
 var pup1=mw1.querySelector('.zpup'),pup2=mw2.querySelector('.zpup');
 var ew1=mw1.querySelectorAll('circle[fill="#fff"]'),ew2=mw2.querySelectorAll('circle[fill="#fff"]');
 var pp1=mw1.querySelectorAll('.zpup circle'),pp2=mw2.querySelectorAll('.zpup circle');
 var DX1=(pp1[0]&&ew1[0])?(parseFloat(pp1[0].getAttribute('cx'))-parseFloat(ew1[0].getAttribute('cx'))):0;
 var DX2=(pp2[0]&&ew2[0])?(parseFloat(pp2[0].getAttribute('cx'))-parseFloat(ew2[0].getAttribute('cx'))):0;
 function look(gx,gy){if(pup1)pup1.style.transform='translate('+(gx-DX1)+'px,'+gy+'px)';if(pup2)pup2.style.transform='translate('+(gx-DX2)+'px,'+gy+'px)';}
 function wink(){[[ew1[1],pp1[1]],[ew2[1],pp2[1]]].forEach(function(pair){pair.forEach(function(x){if(!x)return;x.style.transformBox='fill-box';x.style.transformOrigin='center';x.style.transition='transform .14s ease';x.style.transform='scaleY(.06)';});});setTimeout(function(){[[ew1[1],pp1[1]],[ew2[1],pp2[1]]].forEach(function(pair){pair.forEach(function(x){if(x)x.style.transform='scaleY(1)';});});},380);}
 var gz=null,idx=-1;function step(){all.forEach(function(d){d.classList.remove('hot');});idx=(idx+1)%all.length;var d=all[idx];d.classList.add('hot');look(parseFloat(d.dataset.gx),parseFloat(d.dataset.gy));}
 function typeM(done){var i=0;mt.textContent='';mt.classList.add('typing');(function t(){mt.textContent=MT.slice(0,++i);if(i<MT.length)setTimeout(t,42);else{mt.classList.remove('typing');mt.textContent=MT;setTimeout(done,250);}})();}
 function reset(){if(gz){clearInterval(gz);gz=null;}head.classList.remove('in');mw1.classList.remove('in');mw2.classList.remove('in');mi1.classList.remove('bob');mi2.classList.remove('bob');ins.classList.remove('in');mt.textContent=MT;look(0,0);all.forEach(function(d){d.classList.remove('in','hot');});}
 function intro(){reset();setTimeout(function(){mw1.classList.add('in');mw2.classList.add('in');},250);setTimeout(function(){mi1.classList.add('bob');mi2.classList.add('bob');},900);setTimeout(function(){head.classList.add('in');},950);setTimeout(function(){ins.classList.add('in');},1600);setTimeout(function(){typeM(after);},2050);}
 function after(){wink();setTimeout(function(){AP.forEach(function(b,k){setTimeout(function(){b.classList.add('in');},k*190);});setTimeout(function(){idx=-1;step();gz=setInterval(step,1600);},AP.length*190+450);},520);}
 document.getElementById('replay').addEventListener('click',intro);intro();
})();
</script></body></html>
