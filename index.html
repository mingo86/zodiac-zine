<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zodiac — pop astrology</title>
<meta name="description" content="Zodiac: signs, birth chart, daily horoscope and couple compatibility. Pop comic-style astrology.">
<meta property="og:title" content="Zodiac — pop astrology">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Baloo+2:wght@500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--paper:#fff6e3;--red:#ec2e36;--yellow:#ffd23f;--blue:#2f9bdb;--green:#36b06a;--ink:#15110d;--head:#2c2138;--purple:#6b4ff0;--pink:#ff2d6f;}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{background-image:radial-gradient(circle,rgba(0,0,0,.16) 1.6px,transparent 1.8px),linear-gradient(135deg,#2c2138,#181226);background-size:15px 15px,100% 100%;color:var(--ink);font-family:'Baloo 2',system-ui,sans-serif;min-height:100vh}
.wrap{max-width:880px;margin:clamp(10px,3vw,40px) auto;padding:0 0 44px;background:var(--paper);background-image:radial-gradient(circle,rgba(0,0,0,.05) 1.4px,transparent 1.5px);background-size:12px 12px;border:5px solid var(--ink);border-radius:24px;box-shadow:0 16px 0 rgba(0,0,0,.3);overflow:hidden}
.topbar{display:flex;justify-content:flex-end;padding:12px 16px 0}
.hero{text-align:center;padding:14px 22px 8px}
.ksuper{font-family:'Space Mono',monospace;font-size:13px;letter-spacing:3px;color:var(--purple);text-transform:uppercase}
.htitle{font-family:'Bangers',cursive;font-size:clamp(54px,13vw,104px);color:var(--yellow);-webkit-text-stroke:3px var(--ink);text-shadow:6px 6px 0 var(--ink);letter-spacing:3px;margin:6px 0 2px;line-height:.95}
.hsub{font-weight:600;color:#5b5347;max-width:520px;margin:10px auto 0;font-size:16px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;padding:26px 22px 0}
@media(max-width:600px){.grid{grid-template-columns:1fr}}
.card{display:block;text-decoration:none;color:var(--ink);border:4px solid var(--ink);border-radius:16px;background:#fff;padding:20px;transition:transform .08s;position:relative}
.card:active{transform:translate(3px,3px)}
.card.c1{box-shadow:8px 8px 0 var(--blue)}.card.c2{box-shadow:8px 8px 0 var(--purple)}.card.c3{box-shadow:8px 8px 0 var(--pink)}.card.c4{box-shadow:8px 8px 0 var(--green)}.card.c5{box-shadow:8px 8px 0 var(--yellow)}
.card .ic{font-size:34px;line-height:1}
.card .n{font-family:'Bangers',cursive;font-size:26px;letter-spacing:1px;margin:8px 0 2px}
.card .d{font-weight:600;color:#6b6356;font-size:14px}
.full{grid-column:1 / -1}
.foot{text-align:center;font-family:'Space Mono',monospace;font-size:12px;color:#9a9183;margin-top:26px;font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar"><span id="langPick"></span></div>

    <div class="ksuper" id="ksuper"></div>
    <h1 class="htitle">ZODIAC</h1>
    <p class="hsub" id="hsub"></p>

  <div class="grid" id="grid"></div>
  <div class="foot" id="foot"></div>
