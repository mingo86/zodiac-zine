<!DOCTYPE html>
<html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zodiac — Edizione Fumetto</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Baloo+2:wght@500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>:root{--paper:#fff6e3;--red:#ec2e36;--red-d:#b81f27;--yellow:#ffd23f;--blue:#2f9bdb;--ink:#15110d;
 --wstroke:#15110d;--wa:#2f9bdb;--wb:#ec2e36;--wfill:#fff;--wctext:#fff}
*{box-sizing:border-box;margin:0;padding:0}
body{background-image:radial-gradient(circle,rgba(0,0,0,.16) 1.6px,transparent 1.8px),linear-gradient(135deg,#f0473f,#d9272f);background-size:15px 15px,100% 100%;color:var(--ink);font-family:'Baloo 2',system-ui,sans-serif;font-weight:500;line-height:1.55;min-height:100vh;position:relative}

.nav{position:sticky;top:0;z-index:50;background:var(--ink);color:var(--paper);display:flex;justify-content:space-between;align-items:center;padding:10px clamp(14px,4vw,28px)}
.nav .logo{font-family:'Bangers',cursive;font-size:22px;letter-spacing:.04em;color:var(--yellow);cursor:pointer;-webkit-text-stroke:1px #000}
.nav .links{display:flex;gap:8px;flex-wrap:wrap}
.nav button{font-family:'Bangers',cursive;font-size:15px;letter-spacing:.03em;background:var(--yellow);color:var(--ink);border:3px solid var(--ink);padding:3px 12px;cursor:pointer;transform:rotate(-1deg);transition:.12s}
.nav button.b{background:var(--blue);color:#fff}
.nav button:hover{transform:rotate(0) scale(1.05)}

.wrap{max-width:880px;margin:clamp(14px,3.5vw,34px) auto;background:var(--paper);background-image:radial-gradient(circle,rgba(0,0,0,.05) 1.4px,transparent 1.5px);background-size:12px 12px;border:5px solid var(--ink);border-radius:22px;box-shadow:12px 12px 0 rgba(0,0,0,.45);padding:clamp(20px,4vw,42px) clamp(16px,4vw,38px) clamp(28px,4vw,44px);position:relative;z-index:1}

.cover{text-align:center;padding:clamp(14px,4vw,32px) 0 8px}
.cover .ey{font-family:'Bangers',cursive;font-size:16px;letter-spacing:.05em;background:var(--ink);color:var(--paper);display:inline-block;padding:5px 14px;transform:rotate(-1.5deg)}
.cover h1,.hero h1,.bigpct{font-family:'Bangers',cursive;color:var(--blue);position:relative;display:inline-block;text-transform:uppercase;letter-spacing:.02em;-webkit-text-stroke:2.5px var(--ink)}
.cover h1{font-size:clamp(46px,13vw,104px);line-height:.86;margin:14px 0 6px}
.cover h1::after,.hero h1::after,.bigpct::after{content:attr(data-t);position:absolute;left:4px;top:4px;color:var(--yellow);z-index:-1;-webkit-text-stroke:0}
.cover .tag{font-family:'Space Mono',monospace;display:none}
.cover .tag,.cover .tag *{}
.cover .tag{display:inline-block;font-family:'Bangers',cursive;background:var(--yellow);border:3px solid var(--ink);border-radius:30px;padding:4px 16px;font-size:15px;margin-top:12px;transform:rotate(-1deg);box-shadow:3px 3px 0 var(--ink);color:var(--ink)}

.idx-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;margin-top:28px}
.idx-card{border:4px solid var(--ink);background:#fff;padding:16px 10px;text-align:center;cursor:pointer;box-shadow:5px 5px 0 var(--blue);transition:.12s}
.idx-card:nth-child(2n){box-shadow:5px 5px 0 var(--red)}
.idx-card:hover{transform:translate(-2px,-2px) rotate(-1deg);box-shadow:7px 7px 0 var(--ink)}
.idx-card .g{font-size:34px;line-height:1;color:var(--blue)}
.idx-card .n{font-family:'Bangers',cursive;font-size:21px;letter-spacing:.02em;margin-top:6px;color:var(--ink)}
.idx-card .d{font-family:'Space Mono',monospace;font-size:10.5px;color:#666;margin-top:2px}
.idx-card.special{background:var(--ink);box-shadow:5px 5px 0 var(--yellow)}
.idx-card.special .g{color:var(--yellow)}.idx-card.special .n{color:var(--paper)}.idx-card.special .d{color:var(--yellow)}

.back{font-family:'Bangers',cursive;font-size:15px;letter-spacing:.03em;background:var(--yellow);border:3px solid var(--ink);padding:4px 14px;cursor:pointer;margin-bottom:10px;box-shadow:3px 3px 0 var(--ink)}
.back:hover{transform:translate(-1px,-1px)}

.hero{position:relative;text-align:center;padding:12px 0 6px}
.glyphblob{position:relative;width:104px;height:104px;margin:0 auto 8px}
.glyphblob .bg{position:absolute;inset:0;background:var(--yellow);border:4px solid var(--ink);border-radius:50%}
.glyphblob .bg2{position:absolute;inset:0;background:var(--blue);border:4px solid var(--ink);border-radius:50%;transform:translate(5px,5px);z-index:-1}
.glyphblob .g{position:absolute;inset:0;display:grid;place-items:center;font-size:52px;color:var(--ink)}
.hero h1{font-size:clamp(40px,12vw,88px);line-height:.86}
.sub{font-family:'Space Mono',monospace;font-weight:700;font-size:12px;letter-spacing:.04em;margin-top:12px;display:inline-block;background:var(--ink);color:var(--paper);padding:5px 13px;transform:rotate(-1.5deg)}

.panel{margin-top:24px;border:4px solid var(--ink);background:#fff;box-shadow:7px 7px 0 var(--blue);padding:18px 20px;position:relative}
.panel.alt{box-shadow:7px 7px 0 var(--red)}
.tag{font-family:'Bangers',cursive;font-size:17px;letter-spacing:.03em;text-transform:uppercase;background:var(--red);color:#fff;display:inline-block;padding:3px 13px;margin-bottom:11px;transform:rotate(-1.5deg);box-shadow:2px 2px 0 var(--ink);border:2px solid var(--ink)}
.tag.bl{background:var(--blue)}
.panel p{font-size:16px;color:#241f30;font-weight:500}.panel p b{background:var(--yellow);padding:0 3px;box-shadow:1px 1px 0 var(--ink)}

.pull{margin-top:24px;background:var(--blue);color:var(--paper);border:4px solid var(--ink);padding:20px 22px;font-family:'Bangers',cursive;font-size:clamp(18px,4.4vw,28px);line-height:1.25;letter-spacing:.02em;transform:rotate(-.7deg);box-shadow:7px 7px 0 var(--red)}

.listpanel{margin-top:24px;border:4px dashed var(--ink);padding:16px 18px;background:rgba(255,255,255,.6)}
.zlist{list-style:none;margin-top:6px}
.zlist li{font-family:'Baloo 2';font-weight:600;font-size:15px;padding:7px 0 7px 28px;position:relative;color:#241f30}
.zlist li+li{border-top:2px dotted rgba(0,0,0,.2)}
.zlist.num{counter-reset:s}.zlist.num li{counter-increment:s}
.zlist.num li::before{content:counter(s);position:absolute;left:0;top:6px;background:var(--red);color:#fff;width:20px;height:20px;border-radius:50%;display:grid;place-items:center;font-family:'Bangers';font-size:13px;border:2px solid var(--ink)}
.zlist.no li::before{content:"\2715";position:absolute;left:2px;color:var(--red);font-weight:800}
.zlist.ck li::before{content:"\2713";position:absolute;left:2px;color:var(--blue);font-weight:800}

.stickers{display:flex;flex-wrap:wrap;gap:9px;margin-top:16px;justify-content:center}
.stick{font-family:'Baloo 2';font-weight:800;font-size:13px;border:3px solid var(--ink);background:var(--paper);padding:6px 13px;box-shadow:3px 3px 0 var(--ink)}
.stick:nth-child(2n){background:var(--yellow);transform:rotate(2deg)}
.stick:nth-child(3n){background:var(--blue);color:#fff;transform:rotate(-2deg)}

.flags{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:24px}
@media(max-width:560px){.flags{grid-template-columns:1fr}}
.flag{border:4px solid var(--ink);padding:14px 16px;background:#fff;box-shadow:5px 5px 0 var(--ink)}
.flag h4{font-family:'Bangers',cursive;font-size:18px;text-transform:uppercase;margin-bottom:9px;color:#fff;display:inline-block;padding:2px 12px;border:2px solid var(--ink);transform:rotate(-1deg)}
.flag.gf h4{background:var(--blue)}.flag.rf h4{background:var(--red)}
.flag ul{list-style:none}.flag li{font-family:'Baloo 2';font-weight:600;font-size:13.5px;padding:5px 0 5px 20px;position:relative;color:#241f30}
.flag.gf li::before{content:"\2713";position:absolute;left:2px;color:var(--blue);font-weight:800}
.flag.rf li::before{content:"!";position:absolute;left:5px;color:var(--red);font-weight:800}

.lifegrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:24px}
@media(max-width:560px){.lifegrid{grid-template-columns:1fr}}
.lifecard{border:4px solid var(--ink);padding:14px 16px;background:#fff;box-shadow:4px 4px 0 var(--blue)}
.lifecard:nth-child(2n){box-shadow:4px 4px 0 var(--red)}
.lifecard .lt{font-family:'Bangers',cursive;font-size:15px;letter-spacing:.03em;text-transform:uppercase;color:var(--blue);display:block;margin-bottom:5px}
.lifecard p{font-size:14px;color:#241f30;font-weight:500}

.slr{margin-top:10px}
.slrrow{display:flex;gap:10px;align-items:baseline;padding:9px 0;border-bottom:2px dotted rgba(0,0,0,.2)}
.slrrow:last-child{border-bottom:0}
.slrrow b{font-family:'Bangers',cursive;font-size:15px;min-width:108px;color:var(--red)}
.slrrow span{font-size:14.5px;color:#241f30;font-weight:500}.slrrow i{font-style:italic;color:#666}

.chart{margin-top:26px;border:4px solid var(--ink);padding:18px 20px;background:#fff;box-shadow:7px 7px 0 var(--blue)}
.chart h3{font-family:'Bangers',cursive;font-size:clamp(20px,5vw,30px);text-transform:uppercase;margin-bottom:6px;color:var(--ink)}
.chart .hint{font-family:'Space Mono',monospace;font-size:11px;margin-bottom:14px;color:#666}
.crow{margin-bottom:12px;cursor:pointer}
.crow .ln{display:grid;grid-template-columns:104px 1fr 28px;align-items:center;gap:10px}
.crow .nm{font-family:'Bangers',cursive;font-size:15px;letter-spacing:.02em}
.ctrack{height:15px;background:repeating-linear-gradient(45deg,#0001 0 4px,transparent 4px 8px);border:2px solid var(--ink)}
.cfill{height:100%;background:var(--red)}.crow:nth-child(2n) .cfill{background:var(--blue)}
.crow .sc{font-family:'Bangers',cursive;font-size:16px;text-align:right}
.crow .cnote{font-family:'Baloo 2';font-weight:600;font-size:12px;color:#555;margin:4px 0 0 2px}
@media(max-width:480px){.crow .ln{grid-template-columns:84px 1fr 24px}}

.prevnext{display:flex;justify-content:space-between;margin-top:30px;gap:10px}
.prevnext button{flex:1;font-family:'Bangers',cursive;font-size:16px;border:4px solid var(--ink);background:var(--paper);padding:10px;cursor:pointer;box-shadow:4px 4px 0 var(--ink)}
.prevnext button:hover{transform:translate(-1px,-1px)}

.pickers{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;margin-top:22px}
@media(max-width:560px){.pickers{grid-template-columns:1fr;text-align:center}}
select{width:100%;font-family:'Bangers',cursive;font-size:clamp(18px,4.2vw,24px);letter-spacing:.02em;text-transform:uppercase;background:var(--paper);color:var(--ink);border:4px solid var(--ink);padding:11px;box-shadow:4px 4px 0 var(--blue);cursor:pointer}
.pickers select:nth-child(3){box-shadow:4px 4px 0 var(--red)}
.vs-mid{font-family:'Bangers',cursive;font-size:28px;color:var(--red)}

.scoretop{display:flex;align-items:center;justify-content:center;gap:18px;flex-wrap:wrap;text-align:center;margin-top:26px}
.scoretop .gg{font-size:48px;color:var(--blue)}
.bigpct{font-size:clamp(46px,14vw,84px);line-height:1}
.vbadge{font-family:'Bangers',cursive;font-size:15px;letter-spacing:.03em;background:var(--ink);color:var(--paper);padding:5px 15px;display:inline-block;margin-top:8px;transform:rotate(-1.5deg)}

.dims{margin-top:24px;border:4px solid var(--ink);padding:18px 20px;background:#fff;box-shadow:7px 7px 0 var(--red)}
.drow{display:grid;grid-template-columns:108px 1fr 26px;align-items:center;gap:10px;margin-bottom:11px}
.drow:last-child{margin-bottom:0}
.drow .dn{font-family:'Baloo 2';font-weight:800;font-size:13.5px}
.dtrack{height:17px;background:repeating-linear-gradient(45deg,#0001 0 4px,transparent 4px 8px);border:2px solid var(--ink)}
.dfill{height:100%;background:var(--blue)}.drow:nth-child(2n) .dfill{background:var(--red)}
.drow .ds{font-family:'Bangers',cursive;font-size:16px;text-align:right}
@media(max-width:480px){.drow{grid-template-columns:84px 1fr 22px}}

.twoflow{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:24px}
@media(max-width:560px){.twoflow{grid-template-columns:1fr}}

.reveal{list-style:none;margin-top:8px;columns:2;column-gap:22px}
@media(max-width:560px){.reveal{columns:1}}
.reveal li{font-family:'Baloo 2';font-weight:600;font-size:13.5px;padding:7px 0 7px 20px;position:relative;color:#241f30;break-inside:avoid}
.reveal li::before{content:"\2605";position:absolute;left:0;color:var(--red)}

.wheelwrap{display:flex;justify-content:center;margin:10px 0 4px}.wheel{width:min(320px,86vw);height:auto}
/* ===== le 12 mascotte incuriosite attorno al tema natale ===== */
.natalscene{position:relative;width:min(560px,94vw);aspect-ratio:1;margin:14px auto 6px}
.natalwheel{position:absolute;left:19%;top:19%;width:62%}
.natalwheel .wheel{width:100%;height:auto;display:block}
.npet{position:absolute;width:14.5%;transform:translate(-50%,-50%);z-index:2}
.npet-i{width:100%;transform-origin:50% 90%;animation-name:npeek;animation-timing-function:ease-in-out;animation-iteration-count:infinite}
.npet-i svg{width:100%;height:auto;display:block;overflow:visible}
@keyframes npeek{0%,100%{transform:translate(0,0) rotate(0)}50%{transform:translate(calc(var(--ix)*8px),calc(var(--iy)*8px)) rotate(var(--tilt))}}
.npet-q{position:absolute;top:-10%;left:62%;font-family:'Bangers',cursive;font-size:clamp(13px,2.5vw,19px);line-height:1;color:var(--red);-webkit-text-stroke:1.4px var(--ink);paint-order:stroke fill;opacity:0;animation:nq 3.4s ease-in-out infinite;z-index:3}
@keyframes nq{0%,62%,100%{opacity:0;transform:translateY(4px) scale(.5) rotate(-6deg)}18%,46%{opacity:1;transform:translateY(-3px) scale(1) rotate(6deg)}}
@media(prefers-reduced-motion:reduce){.npet-i{animation:none}.npet-q{display:none}}
.composer{margin-top:14px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:560px){.composer{grid-template-columns:1fr}}
.sentence{margin-top:18px;font-family:'Bangers',cursive;font-size:clamp(18px,4.2vw,26px);line-height:1.3;letter-spacing:.02em}
.sentence b{color:var(--blue)}.sentence b.p{color:var(--red)}

.houses{list-style:none;margin-top:8px}
.houses li{display:grid;grid-template-columns:40px 1fr;gap:12px;padding:9px 0;border-bottom:2px dotted rgba(0,0,0,.2)}
.houses .hn{font-family:'Bangers',cursive;font-size:20px;color:var(--blue)}
.houses .ht{font-family:'Baloo 2';font-weight:800;font-size:14px}
.houses .hd{font-size:13px;color:#555;display:block}
.planets{list-style:none;margin-top:8px}
.planets li{font-family:'Baloo 2';font-weight:600;font-size:14px;padding:8px 0;border-bottom:2px dotted rgba(0,0,0,.2)}
.planets b{font-family:'Bangers',cursive;color:var(--red);letter-spacing:.02em}

.el-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:8px}
.el-card{border:4px solid var(--ink);padding:14px;background:#fff;box-shadow:4px 4px 0 var(--yellow)}
.el-card h4{font-family:'Bangers',cursive;font-size:20px;margin-bottom:4px}
.el-card p{font-size:13px;font-weight:500}.el-card .sgs{font-family:'Space Mono',monospace;font-size:11px;color:#555;margin-top:6px}

.foot{margin-top:34px;text-align:center;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.08em;color:#666;border-top:3px dashed var(--ink);padding-top:14px}

.couple-hero{--ink:#15110d;--figA:#2f9bdb;--figB:#ffd23f;--badge:#fff;text-align:center;border:4px solid var(--ink);background:#fff;box-shadow:7px 7px 0 var(--blue);padding:18px 16px;margin-top:24px}
.couple-hero.good{--bond:#ec2e36}.couple-hero.mid{--bond:#2f9bdb}.couple-hero.bad{--bond:#15110d}
.cscene{width:min(330px,90%);height:auto;display:block;margin:0 auto 6px}
.ctitle{font-family:'Bangers',cursive;font-size:clamp(22px,6vw,36px);letter-spacing:.02em;color:var(--blue);-webkit-text-stroke:2px var(--ink);line-height:1.05;margin-bottom:4px}
.csym{color:var(--bond);-webkit-text-stroke:0}
.h2h{width:100%;border-collapse:collapse;margin-top:6px}
.h2h th{font-family:'Bangers',cursive;font-size:17px;padding:6px 4px;color:var(--ink);border-bottom:3px solid var(--ink)}
.h2h td{padding:7px 6px;border-bottom:2px dotted rgba(0,0,0,.2);font-size:13.5px;font-weight:600;vertical-align:top}
.h2h .hl{font-family:'Space Mono',monospace;font-size:10px;text-transform:uppercase;color:#666;text-align:center;white-space:nowrap}
.h2h .ha{text-align:right;color:#241f30}.h2h .hb{text-align:left;color:#241f30}


.lenstabs{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin:14px 0 4px}
.lenstab{font-family:'Bangers',cursive;font-size:14px;letter-spacing:.02em;background:var(--paper);color:var(--ink);border:3px solid var(--ink);padding:3px 11px;cursor:pointer;box-shadow:2px 2px 0 var(--ink)}
.lenstab.active{background:var(--yellow);box-shadow:2px 2px 0 var(--blue)}


/* ===== theme switch in nav ===== */
.themeswitch{display:flex;gap:5px;margin-right:4px}
.nav{flex-wrap:wrap;gap:8px 10px}
.nav .logo{white-space:nowrap}
.nav button{white-space:nowrap}
.cover .tag{white-space:nowrap}
.cover h1{font-size:clamp(44px,11.5vw,90px)}
.dfill,.cfill{display:block}
.idx-grid{margin-top:42px}
.nav .themebtn{font-family:'Bangers',cursive;font-size:13px;letter-spacing:.03em;background:transparent;color:var(--paper);border:2px solid rgba(255,246,227,.5);padding:3px 10px;cursor:pointer;transform:none}
.nav .themebtn:hover{transform:none;border-color:var(--paper)}
.nav .themebtn.on{background:var(--yellow);color:#15110d;border-color:#15110d}

/* ===== mascots in index + hero ===== */
.idx-m{width:78px;height:78px;margin:0 auto 2px}
.idx-m svg{width:100%;height:100%;display:block;overflow:visible}
.idx-card{transition:transform .12s,box-shadow .12s}
.idx-card:hover .idx-m svg{transform:scale(1.05)}
.hero{position:relative;display:flex;align-items:center;justify-content:space-between;gap:clamp(12px,3vw,34px);flex-wrap:wrap;text-align:left;padding:8px 0 4px;margin-top:30px;padding-left:clamp(8px,4vw,38px)}
.hero{position:relative;display:flex;align-items:center;justify-content:space-between;gap:clamp(14px,4vw,40px);flex-wrap:wrap;text-align:left;padding:8px 0 4px;margin-top:30px;padding-left:clamp(8px,3vw,28px);padding-right:clamp(8px,2.5vw,26px)}
.hero-left{display:flex;align-items:center;justify-content:center;gap:clamp(8px,2.2vw,22px);min-width:0;flex:1 1 auto}
.hero-right{display:flex;flex-direction:column;align-items:flex-end;text-align:right;gap:3px;flex:0 0 auto;align-self:center;margin-top:42px}
.hero-name{font-size:clamp(38px,7.6vw,80px)}
.hero .hero-name{font-size:clamp(38px,7.6vw,80px)}
.hero-m{width:clamp(124px,17vw,172px);margin:0;flex:0 0 auto}
@media(max-width:600px){.hero{flex-direction:column;text-align:center;gap:10px;justify-content:center}.hero-left{flex-direction:column;gap:6px}.hero-right{align-items:center;text-align:center;align-self:center;margin-top:4px}.achips{justify-content:center}}
.hero-m svg{width:100%;height:auto;display:block;overflow:visible}
/* ===== testata segno: chip attributi + mascotte parlante ===== */
.achips{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px;justify-content:flex-end}
.achip{flex:0 0 auto;font-family:'Bangers',cursive;font-size:15px;letter-spacing:.04em;text-transform:uppercase;color:#fff;background:#15110d;border:3px solid var(--ink);border-radius:8px;padding:4px 13px;box-shadow:2px 2px 0 var(--ink);line-height:1.25;white-space:nowrap}
.achip.mod{background:#6b4ff0}
.achip.plan{background:#1f9e8f}
@media(max-width:600px){.achips{justify-content:center}}
.hero-mwrap{position:relative;flex:0 0 auto;width:clamp(124px,17vw,172px)}
.hero-mwrap .hero-m{width:100%}
.hero-m svg{transform-origin:50% 88%}
.el-fuoco .hero-m svg{animation:idleFuoco 1.8s ease-in-out infinite}
@keyframes idleFuoco{0%,100%{transform:translateY(0) rotate(0)}22%{transform:translateY(-8px) rotate(-5deg)}48%{transform:translateY(0) rotate(0)}64%{transform:translateY(-3px) rotate(5deg)}}
.el-terra .hero-m svg{animation:idleTerra 3.4s ease-in-out infinite}
@keyframes idleTerra{0%,100%{transform:rotate(-2.4deg)}50%{transform:rotate(2.4deg)}}
.el-aria .hero-m svg{animation:idleAria 3s ease-in-out infinite}
@keyframes idleAria{0%,100%{transform:translateY(0) rotate(-3.5deg)}50%{transform:translateY(-9px) rotate(3.5deg)}}
.el-acqua .hero-m svg{animation:idleAcqua 2.9s ease-in-out infinite}
@keyframes idleAcqua{0%,100%{transform:translateX(0) rotate(-2deg)}25%{transform:translateX(-5px) rotate(0)}50%{transform:translateX(0) rotate(2deg)}75%{transform:translateX(5px) rotate(0)}}
.talk{position:absolute;inset:0;z-index:6;pointer-events:none;overflow:visible}

.hero-m{position:relative;z-index:1}

.heroBurst{position:absolute;left:50%;top:53%;width:134%;aspect-ratio:1;transform:translate(-50%,-50%);z-index:0;pointer-events:none;--bcol:#ffe08a}

@keyframes burstSpin{to{transform:rotate(360deg)}}

.hfx{position:absolute;opacity:0}

@keyframes hfxFloat{0%{opacity:0;transform:translateY(6px) scale(.5)}25%{opacity:1}100%{opacity:0;transform:translateY(-34px) scale(1.1)}}

@media(prefers-reduced-motion:reduce){.hero-m svg{animation:none}.hero-m.react{animation:none}.hfx{animation:none!important;opacity:0!important}.heroBurst::before,.heroBurst .hbstar{animation:none!important}.bubble.show{animation:none;opacity:1;transform:scale(1)}}

/* ===== couple stage · coreografia ad hoc per fascia di affinità ===== */
.couple-hero{overflow:hidden}
.cstage{position:relative;height:236px;max-width:440px;margin:0 auto 10px}
.cfig{position:absolute;top:50%;width:130px;z-index:2;will-change:transform}
.cfig svg{width:100%;height:auto;display:block;overflow:visible;transform-origin:50% 86%}
.cfig-left{left:17%;opacity:0;transform:translate(-190px,-50%) rotate(-12deg)}
.cfig-right{right:17%;opacity:0;transform:translate(190px,-50%) rotate(12deg)}
.cstage.play .cfig-left,.cstage.play .cfig-right{opacity:1;transform:translate(0,-50%) rotate(0);transition:transform .6s cubic-bezier(.2,.85,.3,1.25),opacity .4s ease}

/* pose d'incontro per livello (transition sul .cfig) */
.cstage.play.met.lvl-5 .cfig-left{transform:translate(50px,-50%) rotate(8deg)}
.cstage.play.met.lvl-5 .cfig-right{transform:translate(-50px,-50%) rotate(-8deg)}
.cstage.play.met.lvl-4 .cfig-left{transform:translate(34px,-50%) rotate(5deg)}
.cstage.play.met.lvl-4 .cfig-right{transform:translate(-34px,-50%) rotate(-5deg)}
.cstage.play.met.lvl-3 .cfig-left{transform:translate(18px,-50%)}
.cstage.play.met.lvl-3 .cfig-right{transform:translate(-18px,-50%)}
.cstage.play.met.lvl-2 .cfig-left{transform:translate(-14px,-50%) rotate(-8deg)}
.cstage.play.met.lvl-2 .cfig-right{transform:translate(14px,-50%) rotate(8deg)}

/* micro-coreografia in loop (transform sul .cfig svg: non confligge con la posa del .cfig) */
/* 100% · si baciano */
.cstage.met.lvl-5 .cfig-left svg{animation:kissL 1.7s ease-in-out .8s infinite}
.cstage.met.lvl-5 .cfig-right svg{animation:kissR 1.7s ease-in-out .8s infinite}
@keyframes kissL{0%,100%{transform:translateX(0) rotate(0)}40%{transform:translateX(11px) rotate(3deg)}60%{transform:translateX(11px) rotate(3deg)}}
@keyframes kissR{0%,100%{transform:translateX(0) rotate(0)}40%{transform:translateX(-11px) rotate(-3deg)}60%{transform:translateX(-11px) rotate(-3deg)}}
/* 80% · si abbracciano */
.cstage.met.lvl-4 .cfig-left svg{animation:hugL 2.6s ease-in-out .8s infinite}
.cstage.met.lvl-4 .cfig-right svg{animation:hugR 2.6s ease-in-out .8s infinite}
@keyframes hugL{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-6px) rotate(3deg)}}
@keyframes hugR{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-6px) rotate(-3deg)}}
/* 60% · equilibrio da costruire (tira e molla) */
.cstage.met.lvl-3 .cfig-left svg{animation:balL 2.6s ease-in-out .8s infinite}
.cstage.met.lvl-3 .cfig-right svg{animation:balR 2.6s ease-in-out .8s infinite}
@keyframes balL{0%,100%{transform:translateX(10px) rotate(3deg)}50%{transform:translateX(-5px) rotate(-2deg)}}
@keyframes balR{0%,100%{transform:translateX(-10px) rotate(-3deg)}50%{transform:translateX(5px) rotate(2deg)}}
/* 40% · scontro tra opposti */
.cstage.met.lvl-2 .cfig-left svg{animation:clashL 1.5s ease-in-out .8s infinite}
.cstage.met.lvl-2 .cfig-right svg{animation:clashR 1.5s ease-in-out .8s infinite}
@keyframes clashL{0%,100%{transform:translateX(0) rotate(0)}16%{transform:translateX(30px) rotate(6deg)}24%{transform:translateX(23px) rotate(4deg)}40%{transform:translateX(-8px) rotate(-4deg)}66%{transform:translateX(0) rotate(0)}}
@keyframes clashR{0%,100%{transform:translateX(0) rotate(0)}16%{transform:translateX(-30px) rotate(-6deg)}24%{transform:translateX(-23px) rotate(-4deg)}40%{transform:translateX(8px) rotate(4deg)}66%{transform:translateX(0) rotate(0)}}
.cstage.met.lvl-2{animation:cclash 1.5s ease-in-out .8s infinite}
@keyframes cclash{0%,12%,100%{transform:translateX(0)}19%{transform:translateX(-5px)}23%{transform:translateX(5px)}28%{transform:translateX(-3px)}34%{transform:translateX(0)}}

/* simbolo del legame */
.cbond{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%) scale(0);z-index:3}
.cbond-sym{font-family:'Bangers',cursive;font-size:42px;line-height:1;color:var(--bond);-webkit-text-stroke:2px var(--ink);display:inline-block}
.couple-hero.bad .cbond-sym{-webkit-text-stroke:0}
.cstage.met .cbond{opacity:1;transform:translate(-50%,-50%) scale(1);transition:transform .5s cubic-bezier(.2,1.6,.4,1),opacity .3s}
.cstage.met.lvl-5 .cbond-sym,.cstage.met.lvl-4 .cbond-sym{animation:cbeat 1s ease-in-out 1s infinite}
.cstage.met.lvl-3 .cbond-sym{animation:cscale 2.6s ease-in-out 1s infinite}
.cstage.met.lvl-2 .cbond-sym{animation:cbuzz .5s linear 1s infinite}
@keyframes cbeat{0%,100%{transform:scale(1)}30%{transform:scale(1.18)}}
@keyframes cscale{0%,100%{transform:rotate(-13deg)}50%{transform:rotate(13deg)}}
@keyframes cbuzz{0%,100%{transform:translate(0,0) rotate(-4deg)}25%{transform:translate(-2px,1px) rotate(3deg)}50%{transform:translate(2px,-1px) rotate(-2deg)}75%{transform:translate(-1px,1px) rotate(4deg)}}

/* decorazioni */
.cdeco{position:absolute;inset:0;z-index:4;pointer-events:none}
.cdeco span{position:absolute;opacity:0;color:var(--bond);font-size:17px}
.cstage.met .cdeco span{animation:cpop .5s ease-out forwards}
.cstage.met.lvl-5 .cdeco span{animation:cfloat 1.9s ease-in infinite}
.cstage.met.lvl-2 .cdeco span{animation:cflash 1.5s ease-out .8s infinite}
.cdeco .d1{left:37%;top:40%;animation-delay:.7s}.cdeco .d2{left:58%;top:44%;font-size:13px;animation-delay:1.35s}.cdeco .d3{left:48%;top:36%;font-size:22px;animation-delay:1.05s}
.cdeco .b1{left:40%;top:30%;font-size:23px;animation-delay:.5s}.cdeco .b2{left:57%;top:34%;font-size:18px;animation-delay:.62s}
@keyframes cpop{0%{opacity:0;transform:scale(0) translateY(5px)}60%{opacity:1;transform:scale(1.2) translateY(-4px)}100%{opacity:1;transform:scale(1) translateY(-7px)}}
@keyframes cfloat{0%{opacity:0;transform:translateY(10px) scale(.4)}25%{opacity:1}100%{opacity:0;transform:translateY(-62px) scale(1.12)}}
@keyframes cflash{0%,55%,100%{opacity:0;transform:scale(.4)}12%{opacity:1;transform:scale(1.3)}22%{opacity:.85;transform:scale(1)}}
@media(prefers-reduced-motion:reduce){.cfig{opacity:1!important;transform:translate(0,-50%)!important}.cfig svg{animation:none!important}.cstage.met.lvl-2{animation:none!important}.cbond{opacity:1!important;transform:translate(-50%,-50%) scale(1)!important}.cbond-sym{animation:none!important}.cdeco span{opacity:1!important;animation:none!important}}

/* ===== COMIC BOOK · mascotte animate ===== */
/* sfondi pannelli: sunburst + retino a pois */
.comicbg{position:relative;overflow:hidden}
.comicbg::before{content:"";position:absolute;inset:-20%;z-index:0;pointer-events:none;
  background:repeating-conic-gradient(from 0deg at var(--bx,80%) 50%, rgba(0,0,0,.05) 0deg 4.5deg, transparent 4.5deg 9deg)}
.comicbg::after{content:"";position:absolute;inset:0;z-index:0;pointer-events:none;mix-blend-mode:multiply;
  background-image:radial-gradient(rgba(0,0,0,.08) 1.1px, transparent 1.7px);background-size:9px 9px}
.comicbg>*{position:relative;z-index:1}
body.theme-adesivi .comicbg::before{background:repeating-conic-gradient(from 0deg at var(--bx,80%) 50%, rgba(120,90,160,.07) 0deg 4.5deg, transparent 4.5deg 9deg)}
body.theme-adesivi .comicbg::after{background-image:radial-gradient(rgba(150,110,180,.13) 1.1px, transparent 1.7px)}

.listpanel.haspet{display:grid;grid-template-columns:1fr 150px;column-gap:18px;align-items:center}
.listpanel.haspet>.tag{grid-column:1 / -1}
.listpanel.haspet>.zlist{grid-column:1;grid-row:2;margin-top:8px}
.m-anim{grid-column:2;grid-row:2;position:relative;width:144px;height:144px;margin:0;justify-self:center;align-self:center;animation:popIn .55s cubic-bezier(.2,1.45,.45,1) both}
.m-anim svg.omino{position:relative;z-index:1;width:120px;height:auto;display:block;margin:0 auto;overflow:visible}
@media(max-width:560px){.listpanel.haspet{grid-template-columns:1fr}.listpanel.haspet>.tag{grid-column:1}.listpanel.haspet>.zlist{grid-column:1;grid-row:auto}.m-anim{grid-column:1;grid-row:auto;margin:2px auto 6px}}
.m-anim .fx{position:absolute;opacity:0;pointer-events:none}
@keyframes popIn{0%{transform:scale(0) rotate(-14deg)}100%{transform:scale(1) rotate(0)}}

/* comic burst (esplosione a stella dietro la mascotte) */
.burst{position:absolute;left:50%;top:50%;width:150px;height:150px;z-index:0;pointer-events:none;
  transform:translate(-50%,-50%);transform-origin:center;animation:burstPulse 3.2s ease-in-out infinite}
.burst polygon{stroke:var(--ink);stroke-width:3;stroke-linejoin:round}
.m-side .burst{width:118px;height:118px}
@keyframes burstPulse{0%,100%{transform:translate(-50%,-50%) rotate(-4deg) scale(.98)}50%{transform:translate(-50%,-50%) rotate(4deg) scale(1.05)}}

/* onomatopee comic */
.onoma{position:absolute;z-index:3;font-family:'Bangers',cursive;letter-spacing:.02em;line-height:.9;
  color:#fff;-webkit-text-stroke:2.4px var(--ink);paint-order:stroke fill;
  text-shadow:3px 3px 0 rgba(0,0,0,.28);pointer-events:none;white-space:nowrap;opacity:0}
@keyframes onomaPop{0%,8%{opacity:0;transform:var(--ot,rotate(-8deg)) scale(.2)}
  18%{opacity:1;transform:var(--ot,rotate(-8deg)) scale(1.18)}26%{transform:var(--ot,rotate(-8deg)) scale(1)}
  78%{opacity:1}100%{opacity:0;transform:var(--ot,rotate(-8deg)) scale(1)}}

/* ♥ come conquistarmi */
.m-love .burst polygon{fill:#ff8fb0}
.m-love svg.omino{animation:loveBob 1.5s ease-in-out infinite;transform-origin:50% 82%}
@keyframes loveBob{0%,100%{transform:translateY(0) rotate(-2.5deg)}50%{transform:translateY(-6px) rotate(2.5deg)}}
.m-love .fx{color:#ff2d6f;font-size:18px;top:30%}
.m-love .h1{left:44%;animation:floatH 1.9s ease-in infinite}
.m-love .h2{left:26%;font-size:13px;animation:floatH 1.9s ease-in .65s infinite}
.m-love .h3{left:62%;font-size:22px;animation:floatH 1.9s ease-in 1.25s infinite}
@keyframes floatH{0%{opacity:0;transform:translateY(8px) scale(.5)}25%{opacity:1}100%{opacity:0;transform:translateY(-52px) scale(1.15)}}
.m-love .onoma{color:#ffe14d;font-size:27px;right:-8px;top:-6px;--ot:rotate(9deg);animation:onomaPop 2.3s ease-out infinite}

/* ✕ cosa chiude la porta */
.m-angry .burst polygon{fill:#9aa1b6}
.m-angry svg.omino{animation:angShake .5s ease-in-out infinite}
@keyframes angShake{0%,100%{transform:translateX(0) rotate(0)}20%{transform:translateX(-3px) rotate(-2.5deg)}40%{transform:translateX(3px) rotate(2.5deg)}60%{transform:translateX(-2px) rotate(-1.5deg)}80%{transform:translateX(2px) rotate(1.5deg)}}

@keyframes veinP{0%,100%{opacity:.4;transform:scale(.85)}50%{opacity:1;transform:scale(1.15)}}
.m-angry .puff,.m-angry .puff2{color:#6f7488;font-weight:800;top:4%}
.m-angry .puff{left:30%;font-size:17px;animation:puffUp 1.2s ease-in infinite}
.m-angry .puff2{left:56%;font-size:13px;animation:puffUp 1.2s ease-in .5s infinite}
@keyframes puffUp{0%{opacity:0;transform:translateY(6px) scale(.6)}30%{opacity:.75}100%{opacity:0;transform:translateY(-22px) scale(1.1)}}
.m-angry .onoma{color:#ff4747;font-size:30px;left:-6px;top:-8px;--ot:rotate(-10deg);animation:onomaPop 1.9s ease-out infinite}

/* lui & lei a lato (float) */

.m-side svg.omino{position:relative;z-index:1;width:96px;height:auto;display:block;margin:0 auto;overflow:visible}

.m-lui .puff{color:#7b8198;font-weight:800;font-size:15px;left:6%;top:22%;animation:puffUp 1.5s ease-in infinite}

  ll:"Affidabilità, impegno concreto e tempo dedicato.",
  sun:"il costruttore ambizioso (Saturno).",moon:"trattiene tutto, si sente sicuro solo nel controllo.",asc:"serio, composto, autorevole.",
  adv:"Il Capricorno dà il meglio con chi apprezza la sua determinazione e pretende standard alti come i suoi: sarà una scalata lenta e costante.",

 {k:"acquario",n:"Acquario",d:"20 gen — 18 feb",el:"aria",mod:"fisso",ru:"Saturno/Urano",g:"\u2652",
  ess:"L'Acquario marcia al ritmo di un tamburo che solo lui sente. Governato da Saturno e Urano, vive di idee, ideali e indipendenza. Originale, ribelle, cerebrale.",
  ess2:"Ama l'umanità in generale e custodisce gelosamente la sua libertà.",
  am:"Ha bisogno di amicizia e spazio prima che romanticismo: ama da pari, non da possessore. Leale ma distaccato, dà il meglio con chi rispetta la sua indipendenza e ne stimola la mente.",
  let:"Sperimentale e mentale: per l'Acquario il sesso parte dalla testa e dalla curiosità. La libertà lo accende, le pretese lo gelano.",
  sap:["Penso fuori dagli schemi.","La libertà è sacra.","Amo l'umanità, a modo mio.","Ribelle per natura.","Le idee prima delle emozioni."],
  con:["Sii prima di tutto un amico.","Rispetta la sua indipendenza.","Stimola la sua mente.","Niente possessività.","Accetta la sua stranezza."],
  deal:["La possessività.","La banalità.","Le pretese emotive eccessive.","Il controllo.","La chiusura mentale."],
  gf:["Originale e indipendente","Mente aperta","Idealista"],
  rf:["Distaccato","Testardo nelle idee","Imprevedibile"],
  ami:"L'anticonformista che conosce tutti ma resta un po' alieno: leale alla causa, meno alle convenzioni.",
  lav:"L'innovatore: idee fuori dagli schemi e visione del futuro; mal sopporta gerarchie e regole rigide.",
  ang:"Si raffredda e prende le distanze: razionalizza, si distacca, può tagliarti fuori di colpo.",
  ll:"Libertà rispettata, complicità mentale e cause condivise.",
  sun:"il ribelle visionario (Urano).",moon:"razionalizza i sentimenti e teme la dipendenza.",asc:"originale, amichevole ma distante.",
  adv:"L'Acquario ha bisogno di libertà e di una mente affine: trattalo da amico-amante alla pari e non cercare di possederlo.",
  q:"Amami da libero, mai da padrone."},

 {k:"pesci",n:"Pesci",d:"19 feb — 20 mar",el:"acqua",mod:"mobile",ru:"Giove/Nettuno",g:"\u2653",

  let:"Sensuali, intuitivi, trasportati: per i Pesci il sesso è fusione spirituale ed emotiva. Percepiscono ciò che vuoi prima che tu lo dica.",

  deal:["La durezza e la freddezza.","Il cinismo.","Chi approfitta della sua bontà.","I conflitti brutali.","La mancanza di romanticismo."],

  rf:["Sfuggente","Tende al vittimismo","Confini deboli"],

const EXTRA={
ariete:{mind:"La mente dell'Ariete vive in modalità «agisci ora, pensa dopo». È mossa dal bisogno di essere primo e dalla paura segreta di essere irrilevante o lento. Non rumina: scarica l'energia nell'azione e si annoia a morte nell'attesa.",work:"Al lavoro è il motore d'avvio: parte per primo, rompe gli indugi, trascina il gruppo nei progetti nuovi. Come collega è energico ma impaziente; come capo ispira e delega in fretta; come collaboratore rende al massimo con autonomia e obiettivi sfidanti, malissimo se lo ingabbi in procedure e riunioni infinite.",spot:["Risponde in tre secondi o mai più.","Ha già iniziato mentre gli altri pianificano.","Si accende per un'idea e la abbandona alla successiva."],growth:"La sua crescita è la pazienza: finire ciò che inizia e capire che aspettare non è perdere."},
toro:{mind:"Il Toro pensa per certezze concrete: tocca, valuta, decide lentamente e poi non torna indietro. È mosso dal bisogno di sicurezza e dal piacere dei sensi; la sua paura profonda è perdere ciò che ha costruito.",work:"Al lavoro è affidabilità pura: lento ad avviarsi, inarrestabile una volta partito. Come collega è la roccia che non molla; come capo è paziente ma inflessibile sui metodi; come collaboratore dà il meglio con stabilità, routine chiare e riconoscimenti tangibili — odia i cambi di rotta improvvisi.",spot:["Ha un posto fisso preferito ovunque vada.","Non lo convinci con la fretta, mai.","Spende poco, ma sul buono non bada a spese."],growth:"La sua sfida è il cambiamento: capire che lasciar andare a volte protegge più che trattenere."},
gemelli:{mind:"La mente dei Gemelli gira a doppia velocità: collega idee, salta da un tema all'altro, si annoia appena ha capito. È mossa dalla curiosità e dalla paura di restare bloccata — in un'idea, in una routine, in una sola versione di sé.",work:"Al lavoro è il jolly: comunica, impara in fretta, gestisce dieci cose insieme. Come collega è brillante e divertente ma volubile; come capo è agile ma incostante; come collaboratore rende dove c'è varietà e parola — soffre la monotonia e i compiti ripetitivi.",spot:["Inizia tre libri e tre serie insieme.","Cambia idea e lo chiama «evoluzione».","Conosce un po' di tutto e tutti."],growth:"La sua crescita è la profondità: scegliere una cosa e restarci abbastanza da padroneggiarla."},
cancro:{mind:"Il Cancro pensa con la pancia: filtra tutto attraverso emozione e memoria, e ricorda ogni sfumatura. È mosso dal bisogno di appartenere e proteggere; la sua paura è l'abbandono e il sentirsi non al sicuro.",work:"Al lavoro è il collante umano del team: intuitivo, premuroso, attento al clima. Come collega ti adotta e ti copre; come capo è protettivo ma umorale; come collaboratore dà tantissimo in un ambiente che sente «famiglia», malissimo dove regnano freddezza e competizione tossica.",spot:["Ti porta da mangiare quando sei giù.","Ricorda date e dettagli che tu hai scordato.","Se tace, qualcosa l'ha ferito."],growth:"La sua sfida è non chiudersi nel guscio: chiedere invece di aspettare di essere capito."},
leone:{mind:"Il Leone pensa in grande e in scena: vuole significare qualcosa, lasciare il segno, essere visto. È mosso dall'orgoglio e dalla generosità; la sua paura nascosta è l'irrilevanza e il non essere amato abbastanza.",work:"Al lavoro è il leader carismatico: motiva, prende il palco, alza l'asticella. Come collega è generoso finché brilla anche lui; come capo è ispiratore ma vuole lealtà e riconoscimento; come collaboratore dà il massimo se valorizzato, si spegne se ignorato o sminuito.",spot:["Entra in una stanza e la stanza se ne accorge.","Regala con larghezza, si offende con stile.","Racconta le storie con sé al centro."],growth:"La sua crescita è l'umiltà: capire che la luce vera non ha bisogno di applausi continui."},
vergine:{mind:"La Vergine pensa per liste, dettagli e «come migliorare questo». Analizza tutto, sé compresa, spesso troppo. È mossa dal bisogno di essere utile e dalla paura del caos e dell'errore.",work:"Al lavoro è oro puro: precisa, metodica, vede i problemi prima che esplodano. Come collega risolve e si fa in quattro; come capo è esigente sui dettagli; come collaboratore eccelle con compiti chiari e standard alti — va in tilt nel disordine e con la fretta sciatta.",spot:["Nota il refuso che nessuno ha visto.","Ha un sistema per tutto, anche per rilassarsi.","Dice «sto bene» mentre sistema qualcosa."],growth:"La sua sfida è lasciar andare il perfetto: «fatto» spesso vale più di «perfetto»."},
bilancia:{mind:"La Bilancia pensa pesando: ogni scelta ha due piatti e li soppesa all'infinito. È mossa dal bisogno di armonia, bellezza e relazione; la sua paura è il conflitto e la solitudine.",work:"Al lavoro brilla dove servono relazioni, mediazione ed estetica: trattative, team, design. Come collega è diplomatica e gradevole; come capo cerca consenso (e rimanda le decisioni dure); come collaboratrice rende in ambienti armoniosi, soffre tensioni e scelte impopolari.",spot:["Ci mette mezz'ora a scegliere dove mangiare.","Disinnesca le liti con un sorriso.","Tutto, attorno a lei, è curato ed estetico."],growth:"La sua crescita è decidere: scegliere per sé anche a costo di scontentare qualcuno."},
scorpione:{mind:"Lo Scorpione pensa in profondità e in bianco e nero: legge sottotesti, bugie, intenzioni. È mosso dal bisogno di verità, controllo e intimità totale; la sua paura è il tradimento e la perdita di potere.",work:"Al lavoro è stratega implacabile: va al cuore delle cose, legge le persone, raggiunge l'obiettivo. Come collega è leale e riservato; come capo è intenso e pretende dedizione; come collaboratore dà tutto per chi si è guadagnato la sua fiducia — diventa un avversario freddo se lo tradisci.",spot:["Capisce chi sei prima che tu parli.","Non dimentica un favore né un torto.","Risponde poco, osserva tutto."],growth:"La sua sfida è fidarsi e mollare il controllo: non tutto è una minaccia."},
sagittario:{mind:"Il Sagittario pensa per orizzonti: cerca il senso, la libertà, la prossima avventura. È mosso dall'ottimismo e dalla fame di esperienza; la sua paura è la gabbia, la routine, il sentirsi intrappolato.",work:"Al lavoro è visione ed entusiasmo: grande sulle idee e i grandi quadri. Come collega contagia energia; come capo ispira ma trascura i dettagli; come collaboratore rende con libertà, scopo e movimento — appassisce nella micro-gestione e alla scrivania fissa.",spot:["Ha sempre un viaggio in programma.","Ti dice la verità in faccia, sempre.","Promette di esserci e poi sparisce all'orizzonte."],growth:"La sua crescita è la costanza: restare abbastanza da raccogliere ciò che semina."},
capricorno:{mind:"Il Capricorno pensa a lungo termine: pianifica, calcola, costruisce mentre gli altri sognano. È mosso dall'ambizione e dal senso del dovere; la sua paura è il fallimento e il non essere all'altezza.",work:"Al lavoro è la spina dorsale: disciplinato, strategico, instancabile. Come collega è serio e affidabile; come capo è autorevole ed esigente (ma giusto); come collaboratore è un investimento sicuro che cresce nel tempo — gli servono rispetto, struttura e una scala da salire.",spot:["Lavora anche quando dice che si riposa.","Ha un piano a cinque anni, davvero.","Sembra freddo, poi ti spiazza con l'ironia secca."],growth:"La sua sfida è vivere adesso: capire che non tutto va guadagnato, qualcosa va solo goduto."},
acquario:{mind:"L'Acquario pensa fuori dagli schemi: vede il futuro, i sistemi, l'insieme prima del singolo. È mosso dagli ideali e dall'indipendenza; la sua paura è perdere la libertà e la propria unicità.",work:"Al lavoro è l'innovatore: idee laterali, visione del domani, zero rispetto per il «si è sempre fatto così». Come collega è originale e leale alla causa; come capo è democratico ma distaccato; come collaboratore rende con autonomia e una missione in cui credere, mal sopporta gerarchie rigide e regole insensate.",spot:["Ha l'opinione che non ti aspetti.","Amico di tutti, intimo di pochi.","Difende cause prima che diventino di moda."],growth:"La sua crescita è la vicinanza: lasciar entrare le persone, non solo le idee."},
pesci:{mind:"I Pesci pensano per immagini, sensazioni e intuizioni, con confini sfumati tra sé e gli altri. Sono mossi dall'empatia e dal sogno; la loro paura è la durezza del mondo reale, da cui tendono a fuggire.",work:"Al lavoro sono creativi e intuitivi: arte, cura, immaginazione, lettura delle persone. Come colleghi sono dolci e disponibili; come capi sono empatici ma poco strutturati; come collaboratori rendono in ruoli creativi o d'aiuto, soffrono scadenze rigide, freddezza e ambienti spietati.",spot:["Sa come ti senti prima che tu lo dica.","Si perde nei suoi mondi a occhi aperti.","Dà più di quanto chiede, a volte troppo."],growth:"La loro sfida sono i confini: imparare a dire no e restare nel reale senza fuggire."}
};

const GEN={
ariete:{lui:"L'uomo Ariete è il cacciatore per eccellenza: diretto, sicuro, ti punta e va dritto al bersaglio. Adora la conquista e la competizione, e si annoia se ottiene tutto troppo facile. Protettivo e passionale, ma l'ego va gestito: vuole sentirsi il tuo eroe.",lei:"La donna Ariete è fuoco e indipendenza: fa lei la prima mossa e non aspetta il permesso di nessuno. Diretta e leale, odia i giochini e la passività. Amarla significa starle al passo — mai provare a domarla."},
toro:{lui:"L'uomo Toro è solido, sensuale e protettivo: lento a innamorarsi, fedelissimo una volta deciso. Mostra l'amore con gesti concreti, comfort e buon cibo. Geloso e ostinato, ha bisogno di sentirsi sicuro del tuo posto al suo fianco.",lei:"La donna Toro è magnetica e concreta: sensuale ma coi piedi per terra. Cerca sicurezza e lealtà, e dà in cambio una presenza calda e affidabile. Pazientissima, finché non la tradisci: lì la porta si chiude per sempre."},
gemelli:{lui:"L'uomo Gemelli conquista con la testa e la parola: brillante, divertente, imprevedibile. Ti tiene sulla corda perché si annoia in fretta — vuole stimoli, leggerezza e mente sveglia. Difficile da inchiodare, facilissimo da amare quando scatta la complicità.",lei:"La donna Gemelli è vivace, sociale e cerebrale: seduce con le idee e le conversazioni infinite. Curiosa e indipendente, ha bisogno di libertà e varietà. Non sopporta la noia né la gelosia: vuole un complice, non un guardiano."},
cancro:{lui:"L'uomo Cancro è il romantico riservato: sotto la corazza, un cuore tenero e protettivo. Ci mette a fidarsi, ma quando ama costruisce un nido. Premuroso e leale, diventa umorale e si chiude se si sente trascurato.",lei:"La donna Cancro è dolce, intuitiva e profondamente leale: ama prendersi cura e crea casa ovunque. Cerca sicurezza emotiva e tenerezza. Sensibile fino alla suscettibilità: ferita, si ritira nel guscio invece di litigare."},
leone:{lui:"L'uomo Leone è il re che corteggia in grande: generoso, fiero, spettacolare. Vuole una partner di cui essere orgoglioso e che lo faccia sentire ammirato. Leale e protettivo finché brilla la sua luce; l'indifferenza, per lui, è l'offesa peggiore.",lei:"La donna Leone è regale e magnetica: entra e la stanza se ne accorge. Vuole essere adorata, non posseduta, e dà in cambio calore e lealtà enormi. Orgogliosa: trattala da regina e avrai tutto, sminuiscila e l'hai persa."},
vergine:{lui:"L'uomo Vergine ama coi fatti, non con le parole: ti risolve i problemi, ti cura nei dettagli, c'è sempre. Riservato e selettivo, fatica a lasciarsi andare e critica per amore. Lo conquisti con sincerità e ordine, lo perdi col caos e le bugie.",lei:"La donna Vergine è elegante, attenta e leale: osserva tutto e si dà a chi se lo merita. Mostra l'amore migliorando ciò che ama. Esigente con sé prima che con te; ha bisogno di sentirsi utile e apprezzata, non corretta a sua volta."},
bilancia:{lui:"L'uomo Bilancia è il gentleman affascinante: galante, diplomatico, esteta. Cerca una partner alla pari con cui condividere bellezza e armonia. Indeciso e allergico ai conflitti, a volte tergiversa troppo: stare in coppia, per lui, è quasi tutto.",lei:"La donna Bilancia è grazia e charme: socievole, romantica, raffinata. Cerca equilibrio e un compagno con cui specchiarsi. Sa farsi desiderare ma odia le scenate; conquistala con eleganza e reciprocità, niente volgarità e niente drammi."},

function elScore(a,b){if(a===b)return 5;const k=[a,b].sort().join("|");return {"aria|fuoco":4,"acqua|terra":4,"acqua|aria":3,"aria|terra":3,"fuoco|terra":3,"acqua|fuoco":2}[k]||3;}
function modAdj(a,b){return a===b?-0.5:0.25;}
function overall(a,b){return Math.min(5,Math.max(2,Math.round(elScore(a.el,b.el)+modAdj(a.mod,b.mod))));}
function dims(a,b){const e=[a.el,b.el];const has=x=>e.includes(x);const both=x=>e[0]===x&&e[1]===x;let P=3,E=3,I=3,S=3;
  if(has("fuoco"))P++; if(both("fuoco"))P=5; if(has("fuoco")&&has("aria"))P=Math.max(P,5);
  if(has("acqua"))E++; if(both("acqua"))E=5;
  if(has("aria"))I++; if(both("aria"))I=5; if(a.el===b.el)I++;
  if(has("terra"))S++; if(both("terra"))S=5; if(a.mod==="fisso"&&b.mod==="fisso")S++; if(a.mod==="cardinale"&&b.mod==="cardinale")S--;
  const c=x=>Math.min(5,Math.max(1,x));return{Passione:c(P),Emozione:c(E),Intesa:c(I),Stabilità:c(S)};}

function natalWheelSVG(){
  const cx=160,cy=160,rO=150,rI=92,rG=121;let s="";
  for(let i=0;i<12;i++){const a=(-90+i*30+15)*Math.PI/180;const x1=cx+rI*Math.cos(a),y1=cy+rI*Math.sin(a),x2=cx+rO*Math.cos(a),y2=cy+rO*Math.sin(a);s+=`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="var(--wstroke)" stroke-width="2"/>`;}
  for(let i=0;i<12;i++){const a=(-90+i*30)*Math.PI/180;const x=cx+rG*Math.cos(a),y=cy+rG*Math.sin(a);s+=`<text x="${x.toFixed(1)}" y="${(y+7).toFixed(1)}" text-anchor="middle" font-size="20" fill="var(--wa)">${SIGNS[i].g}</text>`;
    const hx=cx+(rI-14)*Math.cos(a),hy=cy+(rI-14)*Math.sin(a);s+=`<text x="${hx.toFixed(1)}" y="${(hy+4).toFixed(1)}" text-anchor="middle" font-size="10" font-family="'Space Mono',monospace" fill="var(--wb)">${i+1}</text>`;}
  return `<svg class="wheel" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg"><circle cx="160" cy="160" r="150" fill="var(--wfill)" stroke="var(--wstroke)" stroke-width="4"/><circle cx="160" cy="160" r="92" fill="none" stroke="var(--wstroke)" stroke-width="3"/><circle cx="160" cy="160" r="40" fill="var(--wb)" stroke="var(--wstroke)" stroke-width="3"/><text x="160" y="166" text-anchor="middle" font-size="26" fill="var(--wctext)">✦</text>${s}</svg>`;
}
function natalSceneHTML(){
  let pets="";
  for(let i=0;i<12;i++){
    const sg=SIGNS[i];
    const a=(-90+i*30)*Math.PI/180, R=40;
    const left=(50+R*Math.cos(a)).toFixed(2), top=(50+R*Math.sin(a)).toFixed(2);
    const ix=(-Math.cos(a)).toFixed(3), iy=(-Math.sin(a)).toFixed(3);
    const look=Math.cos(a)>=0?-1:1;
    const tilt=(Math.cos(a)>=0?7:-7)+"deg";
    const dur=(3.4+(i%3)*0.5).toFixed(1), pdelay=(i*0.22).toFixed(2);
    const q=(i%3===0)?`<span class="npet-q">?</span>`:"";
    pets+=`<div class="npet" style="left:${left}%;top:${top}%;--ix:${ix};--iy:${iy};--tilt:${tilt}">${q}<div class="npet-i" style="animation-delay:${pdelay}s;animation-duration:${dur}s">${mc(sg,look,'happy')}</div></div>`;
  }
  return `<div class="natalscene">${pets}<div class="natalwheel">${natalWheelSVG()}</div></div>`;
}

 const e=[a.el,b.el],has=x=>e.includes(x),both=x=>e[0]===x&&e[1]===x,cc=v=>Math.min(5,Math.max(1,Math.round(v)));
 const sameEl=a.el===b.el,cat=elCat(a.el,b.el),fixCnt=(a.mod==="fisso"?1:0)+(b.mod==="fisso"?1:0);
 const cardCard=a.mod==="cardinale"&&b.mod==="cardinale",fixFix=a.mod==="fisso"&&b.mod==="fisso",mutMut=a.mod==="mobile"&&b.mod==="mobile";
 if(lk==="amore"){const d=dims(a,b);return [d.Passione,d.Emozione,d.Intesa,d.Stabilità];}
 if(lk==="amicizia"){
  let div=3+(has("fuoco")?1:0)+(has("aria")?1:0)-(both("acqua")?1:0);

  let sin=sameEl?5:cat==="ally"?4:3;

 if(lk==="lavoro"){
  let com=cat==="challenge"?5:cat==="ally"?4:3;if(both("fuoco"))com=2;
  let aff=3+(has("terra")?1:0)+(both("terra")?1:0)+fixCnt*0.5-((has("fuoco")&&has("aria"))?1:0);
  let vis=3+(has("fuoco")?1:0)+(has("aria")?1:0);
  let con=4-(cardCard?2:0)-(fixFix?1:0)-(mutMut?1:0);
  return [cc(com),cc(aff),cc(vis),cc(con)];}
 if(lk==="famiglia"){
  let arm=(sameEl?4:cat==="ally"?4:3)-(both("fuoco")?1:0)+(has("acqua")?0.5:0);
  let sup=3+(has("acqua")?1:0)+(both("acqua")?1:0)+(has("terra")?0.5:0);
  let spa=4-(fixFix?1:0)+(has("aria")?0.5:0);
  let lea=4+fixCnt*0.5+(has("acqua")?0.5:0);
  return [cc(arm),cc(sup),cc(spa),cc(lea)];}
 if(lk==="convivenza"){
  let ord=3+(has("terra")?1:0)+(both("terra")?1:0)-(both("fuoco")?1:0);
  let spa=3.5-(fixFix?1:0)+(has("aria")?0.5:0);
  let cli=((cat==="ally"||sameEl)?4:3)-(both("fuoco")?1:0)+(has("acqua")?0.5:0);
  let con=3.5-(cardCard?1:0)+((!cardCard&&!fixFix)?0.5:0);
  return [cc(ord),cc(spa),cc(cli),cc(con)];}
 if(lk==="ex"){
  const air=has("aria"),wat=has("acqua"),fir=has("fuoco");
  let ami=3+(air?1:0)+(mutMut?1:0)-(wat?1:0)-(fixFix?1:0);
  let chi=3+(air?1:0)+(mutMut?1:0)-(fir?1:0)-(fixFix?0.5:0);
  let ris=3.5+(has("terra")?0.5:0)+(air?0.5:0);
  let fia=2+(wat?1:0)+(fir?1:0)+fixCnt*0.5-(air?0.5:0);
  return [cc(ami),cc(chi),cc(ris),cc(fia)];}
 if(lk==="capo"){
  let led=cardCard?2:((a.mod==="cardinale"||b.mod==="cardinale")?5:3);
  let fid=3+(has("terra")?1:0)-(fixFix?1:0)+(has("acqua")?0.5:0);
  let com=3+(has("aria")?1:0)+(has("fuoco")?0.5:0);
  let cre=3+(cat==="ally"?1:0)+(cat==="challenge"?0.5:0)-(both("fuoco")?1:0)+(has("terra")?0.5:0);
  return [cc(led),cc(fid),cc(com),cc(cre)];}
 const d=dims(a,b);return [d.Passione,d.Emozione,d.Intesa,d.Stabilità];
}

function lensDyn(lk,a,b){const cat=elCat(a.el,b.el);const mk=[a.mod,b.mod].sort().join("|");const t=LTX[lk]||LTX.amore;return {uni:t.u[cat],sco:t.s[cat],mod:(MODTX[mk]||"")};}
