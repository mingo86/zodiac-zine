<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zodiac · Coppie — Lab 3 direzioni</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Luckiest+Guy&family=Fredoka:wght@500;600;700&family=Baloo+2:wght@600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:#0c0d12;font-family:'Space Mono',monospace;color:#fff;-webkit-font-smoothing:antialiased}

/* ===== LAB BAR (chrome neutro per cambiare direzione) ===== */
.labbar{position:sticky;top:0;z-index:80;display:flex;align-items:center;justify-content:space-between;gap:14px;
  padding:11px clamp(14px,3.5vw,30px);background:#121319;border-bottom:1px solid #2a2c36;flex-wrap:wrap}
.labbar .brand{display:flex;align-items:baseline;gap:9px}
.labbar .brand b{font-family:'Luckiest Guy',cursive;font-size:16px;letter-spacing:.02em;color:#fff}
.labbar .brand span{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#7e818f}
.dirtabs{display:flex;gap:6px;background:#1c1e26;padding:4px;border-radius:11px;border:1px solid #2a2c36}
.dirtab{display:flex;flex-direction:column;align-items:flex-start;gap:1px;padding:6px 13px;border:0;border-radius:8px;background:transparent;
  color:#9a9db0;cursor:pointer;font-family:'Space Mono',monospace;transition:.16s;text-align:left}
.dirtab .dt-n{font-size:12.5px;font-weight:700;letter-spacing:.02em}
.dirtab .dt-d{font-size:9px;letter-spacing:.08em;text-transform:uppercase;opacity:.7}
.dirtab:hover{color:#cfd2e0;background:#23252f}
.dirtab.active{color:#0c0d12;background:#fff}
.dirtab.active.t-adesivi{background:#ffc24b;color:#3a2a08}
.dirtab.active.t-stampa{background:#ffd23f;color:#221c08}

/* ===== STAGE (contenitore del tema) ===== */
#stage{min-height:calc(100vh - 56px)}
.cl-root{min-height:calc(100vh - 56px);padding:clamp(18px,4vw,40px) clamp(14px,4vw,30px) 70px;
  --maxw:780px;--ink:#15110d}
.cl-inner,.cl-head,.cl-pickers,.cl-result{max-width:var(--maxw);margin-left:auto;margin-right:auto}

/* ----- testata ----- */
.cl-head{text-align:center}
.cl-kicker{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;opacity:.8}
.cl-title{font-family:var(--fd);line-height:.9;margin:6px 0 4px;position:relative;display:inline-block}
.cl-intro{font-family:'Space Mono',monospace;font-size:12.5px;opacity:.75;margin-bottom:16px}
.cl-lens{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:6px}
.cl-lens-tab{display:inline-flex;align-items:center;gap:6px;font-family:var(--fd);font-weight:600;font-size:13px;
  padding:5px 12px;border-radius:9px;cursor:pointer;transition:.15s;letter-spacing:.01em}
.cl-lens-g{font-size:13px}

/* ----- pickers ----- */
.cl-pickers{display:grid;grid-template-columns:1fr auto 1fr auto;gap:12px;align-items:end;margin:18px auto 6px}
@media(max-width:620px){.cl-pickers{grid-template-columns:1fr 1fr;align-items:end}.cl-vs{grid-column:1/3;order:-1}.cl-shuffle{grid-column:1/3}}
.cl-pick{display:flex;flex-direction:column;gap:5px;min-width:0}
.cl-pick-lab{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;opacity:.7;padding-left:3px}
.cl-select-wrap{position:relative}
.cl-select-wrap::after{content:"▾";position:absolute;right:14px;top:50%;transform:translateY(-50%);pointer-events:none;font-size:13px;opacity:.7}
select{width:100%;-webkit-appearance:none;appearance:none;font-family:var(--fd);font-weight:600;font-size:clamp(16px,3.4vw,21px);
  padding:11px 34px 11px 14px;cursor:pointer;border-radius:11px;outline:none}
.cl-vs{font-family:var(--fd);font-size:26px;align-self:center;padding-bottom:6px;text-align:center}
.cl-shuffle{font-family:'Space Mono',monospace;font-weight:700;font-size:12px;padding:11px 14px;border-radius:11px;cursor:pointer;
  align-self:end;transition:.15s;white-space:nowrap}
.cl-shuffle:active{transform:translateY(1px)}

/* ===================== SCENA + ANIMAZIONE ===================== */
.cl-stage{position:relative;height:300px;margin:22px auto 6px;max-width:560px;border-radius:18px;overflow:hidden}
.cl-floor{position:absolute;left:0;right:0;bottom:34px;height:2px}
.fig{position:absolute;top:48%;width:148px;height:auto;z-index:2;will-change:transform}
.fig .omino{width:100%;height:auto;display:block;overflow:visible}
.fig-left{left:20%;opacity:0;transform:translate(-230px,-50%) rotate(-13deg)}
.fig-right{right:20%;opacity:0;transform:translate(230px,-50%) rotate(13deg)}
.cl-stage.play .fig-left{opacity:1;transform:translate(0,-50%) rotate(0);transition:transform .62s cubic-bezier(.2,.85,.3,1.25),opacity .4s ease}
.cl-stage.play .fig-right{opacity:1;transform:translate(0,-50%) rotate(0);transition:transform .62s cubic-bezier(.2,.85,.3,1.25),opacity .4s ease}
/* incontro: i buoni si avvicinano, i pessimi si respingono */
.cl-stage.play.met.state-good .fig-left{transform:translate(42px,-50%) rotate(4deg)}
.cl-stage.play.met.state-good .fig-right{transform:translate(-42px,-50%) rotate(-4deg)}
.cl-stage.play.met.state-bad .fig-left{transform:translate(-14px,-50%) rotate(-7deg)}
.cl-stage.play.met.state-bad .fig-right{transform:translate(14px,-50%) rotate(7deg)}
.cl-stage.play.met.state-good .fig{animation:bob 2.6s ease-in-out .6s infinite}
.cl-stage.play.met.state-good .fig-right{animation-delay:.85s}
.cl-stage.met.state-bad{animation:shake .42s ease}
@keyframes bob{0%,100%{margin-top:0}50%{margin-top:-7px}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(3px)}}

.cl-bond{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%) scale(0);z-index:3;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:2px}
.cl-bond-sym{font-size:46px;line-height:1;display:block}
.cl-bond-vs{font-family:var(--fd);font-size:20px;letter-spacing:.04em}
.cl-stage.met .cl-bond{opacity:1;transform:translate(-50%,-50%) scale(1);transition:transform .5s cubic-bezier(.2,1.6,.4,1),opacity .3s}
.cl-stage.met.state-good .cl-bond-sym{animation:beat 1s ease-in-out .5s infinite}
@keyframes beat{0%,100%{transform:scale(1)}25%{transform:scale(1.18)}40%{transform:scale(1)}}

.cl-burst{position:absolute;left:50%;top:44%;width:10px;height:10px;transform:translate(-50%,-50%);z-index:1;border-radius:50%}
.cl-stage.met .cl-burst{animation:burst .6s ease-out forwards}
@keyframes burst{0%{box-shadow:0 0 0 0 var(--burst,#fff6),0 0 0 0 var(--burst,#fff3);opacity:.9}100%{box-shadow:0 0 0 60px transparent,0 0 0 110px transparent;opacity:0}}

.cl-deco{position:absolute;inset:0;z-index:4;pointer-events:none}
.cl-deco .deco{position:absolute;opacity:0;font-size:18px}
.cl-stage.met .deco{animation:pop .5s ease-out forwards}
.cl-stage.met .deco.d1{left:38%;top:24%;animation-delay:.55s}
.cl-stage.met .deco.d2{left:60%;top:30%;animation-delay:.68s;font-size:13px}
.cl-stage.met .deco.d3{left:50%;top:14%;animation-delay:.8s;font-size:22px}
.cl-stage.met .deco.d4{left:44%;top:40%;animation-delay:.9s;font-size:12px}
.cl-stage.met .deco.bolt{font-size:24px}
.cl-stage.met .deco.b1{left:40%;top:28%;animation-delay:.5s}
.cl-stage.met .deco.b2{left:58%;top:34%;animation-delay:.62s}
@keyframes pop{0%{opacity:0;transform:scale(0) translateY(6px)}60%{opacity:1;transform:scale(1.25) translateY(-4px)}100%{opacity:1;transform:scale(1) translateY(-8px)}}

@media(prefers-reduced-motion:reduce){
  .fig-left,.fig-right{opacity:1!important;transform:translate(0,-50%)!important;transition:none!important;animation:none!important}
  .cl-bond{opacity:1!important;transform:translate(-50%,-50%) scale(1)!important}
  .cl-deco .deco{opacity:1!important;animation:none!important}
  .cl-pct{}
}

/* ===================== SCORE ===================== */
.cl-score{text-align:center;margin:6px auto 4px}
.cl-pct{font-family:var(--fd);line-height:1}
.cl-names{font-family:var(--fd);margin-top:2px}
.cl-names-sym{margin:0 4px}
.cl-verdict{font-family:'Space Mono',monospace;font-size:12.5px;margin-top:8px;display:inline-block;padding:5px 13px;border-radius:20px}

/* ===================== BLOCCHI ===================== */
.cl-result{margin-top:6px}
.cl-block{margin-top:18px;padding:16px 18px;position:relative}
.cl-tag{display:inline-block;font-family:var(--fd);font-weight:600;font-size:13px;letter-spacing:.02em;text-transform:uppercase;
  padding:3px 11px;border-radius:7px;margin-bottom:10px;white-space:nowrap}
.cl-p{font-size:14.5px;line-height:1.6;font-family:'Baloo 2',sans-serif;font-weight:600}
.cl-two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:560px){.cl-two{grid-template-columns:1fr}}

.cl-h2h{width:100%;border-collapse:collapse;margin-top:2px}
.cl-h2h th{font-family:var(--fd);font-weight:600;font-size:15px;padding:6px 4px}
.cl-h2h td{padding:8px 6px;font-size:13px;font-family:'Baloo 2',sans-serif;font-weight:600;vertical-align:top}
.cl-h2h .hl{font-family:'Space Mono',monospace;font-size:10px;text-transform:uppercase;text-align:center;white-space:nowrap;opacity:.65}
.cl-h2h .ha{text-align:right}.cl-h2h .hb{text-align:left}

.cl-drow{display:grid;grid-template-columns:124px 1fr 26px;align-items:center;gap:10px;margin-top:9px}
.cl-drow:first-of-type{margin-top:4px}
.cl-dn{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:12.5px}
.cl-dtrack{height:14px;border-radius:8px;overflow:hidden;position:relative}
.cl-dfill{display:block;height:100%;border-radius:8px;transition:width .7s cubic-bezier(.2,.8,.3,1)}
.cl-ds{font-family:var(--fd);font-weight:600;font-size:15px;text-align:right}
@media(max-width:480px){.cl-drow{grid-template-columns:96px 1fr 22px}}

.cl-advice{display:flex;gap:12px;align-items:flex-start;margin-top:20px;padding:16px 18px}
.cl-advice-mark{font-family:var(--fd);font-size:22px;line-height:1}
.cl-advice p{font-size:14.5px;line-height:1.6;font-family:'Baloo 2',sans-serif;font-weight:600}

/* ============================================================
   ░░░  TEMA 1 · STAMPA — fumetto newsprint pop  ░░░
   ============================================================ */
.theme-stampa{--fd:'Bangers',cursive;--red:#ec2e36;--blue:#2f9bdb;--yellow:#ffd23f;
  background:
   radial-gradient(circle,rgba(0,0,0,.05) 1.3px,transparent 1.5px),
   #fff6e3;background-size:12px 12px,100% 100%;color:#15110d}
.theme-stampa .cl-kicker{color:#a23}
.theme-stampa .cl-title{font-size:clamp(54px,15vw,118px);color:var(--blue);-webkit-text-stroke:3px #15110d;letter-spacing:.01em}
.theme-stampa .cl-title::after{content:attr(data-t);position:absolute;left:5px;top:5px;color:var(--yellow);-webkit-text-stroke:0;z-index:-1}
.theme-stampa .cl-intro{color:#6b5a3a}
.theme-stampa .cl-lens-tab{background:#fff;border:3px solid #15110d;box-shadow:2px 2px 0 #15110d;color:#15110d}
.theme-stampa .cl-lens-tab.active{background:var(--yellow);box-shadow:2px 2px 0 var(--blue)}
.theme-stampa .cl-lens-tab:hover{transform:translate(-1px,-1px)}
.theme-stampa .cl-pick-lab{color:#7a6840}
.theme-stampa select{background:#fff6e3;border:4px solid #15110d;box-shadow:4px 4px 0 var(--blue);color:#15110d;text-transform:uppercase}
.theme-stampa .cl-pick:nth-child(3) select{box-shadow:4px 4px 0 var(--red)}
.theme-stampa .cl-vs{color:var(--red)}
.theme-stampa .cl-shuffle{background:var(--yellow);border:3px solid #15110d;box-shadow:3px 3px 0 #15110d;color:#15110d}
.theme-stampa .cl-stage{background:#fff;border:4px solid #15110d;box-shadow:7px 7px 0 var(--blue)}
.theme-stampa .cl-floor{background:repeating-linear-gradient(90deg,#15110d 0 8px,transparent 8px 16px);opacity:.3}
.theme-stampa .cl-burst{--burst:#ffd23f88}
.theme-stampa .cl-bond-sym{-webkit-text-stroke:2px #15110d}
.theme-stampa .state-good .cl-bond-sym{color:var(--red)}
.theme-stampa .state-mid .cl-bond-sym{color:var(--blue)}
.theme-stampa .state-bad .cl-bond-sym{color:#15110d;-webkit-text-stroke:0}
.theme-stampa .deco{color:var(--red)}
.theme-stampa .cl-pct{font-size:clamp(50px,15vw,92px);color:var(--blue);-webkit-text-stroke:3px #15110d}
.theme-stampa .cl-names{font-size:clamp(20px,5vw,30px);color:#15110d}
.theme-stampa .cl-names-sym{color:var(--red)}
.theme-stampa .cl-verdict{background:#15110d;color:#fff6e3}
.theme-stampa .cl-block{background:#fff;border:4px solid #15110d;box-shadow:6px 6px 0 var(--blue)}
.theme-stampa .cl-block.alt,.theme-stampa .cl-block.tone-down{box-shadow:6px 6px 0 var(--red)}
.theme-stampa .cl-tag{background:var(--red);color:#fff;border:2px solid #15110d;box-shadow:2px 2px 0 #15110d}
.theme-stampa .cl-block.alt .cl-tag,.theme-stampa .cl-block.tone-up .cl-tag{background:var(--blue)}
.theme-stampa .cl-p{color:#241f30}
.theme-stampa .cl-h2h th{color:#15110d;border-bottom:3px solid #15110d}
.theme-stampa .cl-h2h td{border-bottom:2px dotted rgba(0,0,0,.22);color:#241f30}
.theme-stampa .cl-dn{color:#15110d}
.theme-stampa .cl-dtrack{background:repeating-linear-gradient(45deg,#0001 0 4px,transparent 4px 8px);border:2px solid #15110d;border-radius:0}
.theme-stampa .cl-dfill{background:var(--red);border-radius:0}
.theme-stampa .cl-drow:nth-child(odd) .cl-dfill{background:var(--blue)}
.theme-stampa .cl-ds{color:#15110d}
.theme-stampa .cl-advice{background:var(--blue);color:#fff6e3;border:4px solid #15110d;box-shadow:6px 6px 0 #15110d}
.theme-stampa .cl-advice p{color:#fff6e3}

/* ============================================================
   ░░░  TEMA 2 · ADESIVI — riso sticker / memphis  ░░░
   ============================================================ */
.theme-adesivi{--fd:'Fredoka',sans-serif;--pink:#ff5d73;--blue:#4a86d8;--ylw:#ffc24b;--grn:#4cb285;--cream:#fbf3e7;--ink2:#2c2138;
  background:
   radial-gradient(circle at 12% 18%,rgba(255,93,115,.16) 0 9px,transparent 10px),
   radial-gradient(circle at 86% 12%,rgba(74,134,216,.16) 0 7px,transparent 8px),
   radial-gradient(circle at 78% 82%,rgba(76,178,133,.15) 0 8px,transparent 9px),
   radial-gradient(circle at 22% 86%,rgba(255,194,75,.18) 0 6px,transparent 7px),
   var(--cream);color:var(--ink2)}
.theme-adesivi .cl-kicker{color:var(--pink)}
.theme-adesivi .cl-title{font-family:var(--fd);font-weight:700;font-size:clamp(48px,13vw,98px);color:var(--blue);text-shadow:4px 4px 0 #fff,7px 7px 0 rgba(44,33,56,.18)}
.theme-adesivi .cl-intro{color:#7a6e84}
.theme-adesivi .cl-lens-tab{background:#fff;border:2px solid var(--ink2);border-radius:22px;color:var(--ink2);box-shadow:2px 2px 0 rgba(44,33,56,.12)}
.theme-adesivi .cl-lens-tab.active{background:var(--ylw);box-shadow:2px 2px 0 var(--ink2)}
.theme-adesivi .cl-lens-tab:hover{transform:translateY(-1px)}
.theme-adesivi .cl-pick-lab{color:#9a8ea4}
.theme-adesivi select{background:#fff;border:2.5px solid var(--ink2);border-radius:16px;color:var(--ink2);box-shadow:3px 3px 0 var(--blue)}
.theme-adesivi .cl-pick:nth-child(3) select{box-shadow:3px 3px 0 var(--pink)}
.theme-adesivi .cl-vs{color:var(--pink)}
.theme-adesivi .cl-shuffle{background:var(--ylw);border:2.5px solid var(--ink2);border-radius:16px;color:var(--ink2);box-shadow:3px 3px 0 var(--ink2)}
.theme-adesivi .cl-stage{background:repeating-linear-gradient(135deg,#fff 0 22px,#fdf6ec 22px 44px);border:3px solid var(--ink2);border-radius:24px;box-shadow:6px 6px 0 rgba(44,33,56,.16)}
.theme-adesivi .cl-floor{display:none}
/* overprint: nei rapporti "buoni" gli adesivi si sovrappongono e i colori si fondono */
/* overprint disattivato: ora alone die-cut sulle mascotte */
.theme-adesivi .fig-left{left:20%}
.theme-adesivi .fig-right{right:20%}
.theme-adesivi .cl-stage.play.met.state-good .fig-left{transform:translate(42px,-50%) rotate(4deg)}
.theme-adesivi .cl-stage.play.met.state-good .fig-right{transform:translate(-42px,-50%) rotate(-4deg)}
.theme-adesivi .cl-burst{--burst:rgba(255,93,115,.4)}
.theme-adesivi .cl-bond{mix-blend-mode:normal}
.theme-adesivi .cl-bond-sym{filter:drop-shadow(2px 2px 0 #fff)}
.theme-adesivi .state-good .cl-bond-sym{color:var(--pink)}
.theme-adesivi .state-mid .cl-bond-sym{color:var(--blue)}
.theme-adesivi .state-bad .cl-bond-sym{color:var(--ink2)}
.theme-adesivi .deco{color:var(--pink)}
.theme-adesivi .cl-pct{font-family:var(--fd);font-weight:700;font-size:clamp(52px,14vw,94px);color:var(--blue);text-shadow:3px 3px 0 #fff}
.theme-adesivi .cl-names{font-weight:700;font-size:clamp(18px,4.6vw,28px);color:var(--ink2)}
.theme-adesivi .cl-names-sym{color:var(--pink)}
.theme-adesivi .cl-verdict{background:#fff;border:2px solid var(--ink2);border-radius:20px;color:var(--ink2)}
.theme-adesivi .cl-block{background:#fff;border:2.5px solid var(--ink2);border-radius:18px;box-shadow:5px 5px 0 rgba(44,33,56,.14)}
.theme-adesivi .cl-block.alt{box-shadow:5px 5px 0 var(--blue)}
.theme-adesivi .cl-block.tone-down{box-shadow:5px 5px 0 var(--pink)}
.theme-adesivi .cl-tag{background:var(--pink);color:#fff;border-radius:20px}
.theme-adesivi .cl-block.alt .cl-tag,.theme-adesivi .cl-block.tone-up .cl-tag{background:var(--blue)}
.theme-adesivi .cl-p{color:#3a2f46}
.theme-adesivi .cl-h2h th{color:var(--ink2);border-bottom:2.5px solid var(--ink2)}
.theme-adesivi .cl-h2h td{border-bottom:2px dotted rgba(44,33,56,.18);color:#4a3f56}
.theme-adesivi .cl-dn{color:var(--ink2)}
.theme-adesivi .cl-dtrack{background:#efe6da;border:2px solid var(--ink2)}
.theme-adesivi .cl-dfill{background:var(--pink)}
.theme-adesivi .cl-drow:nth-child(odd) .cl-dfill{background:var(--blue)}
.theme-adesivi .cl-drow:nth-child(3n) .cl-dfill{background:var(--grn)}
.theme-adesivi .cl-ds{color:var(--ink2)}
.theme-adesivi .cl-advice{background:var(--ylw);border:2.5px solid var(--ink2);border-radius:18px;box-shadow:5px 5px 0 var(--ink2)}
.theme-adesivi .cl-advice-mark{color:var(--ink2)}
.theme-adesivi .cl-advice p{color:var(--ink2)}
</style>
</head>
<body>
<div class="labbar">
  <div class="brand"><b>ZODIAC</b><span>· coppie lab</span></div>
  <div class="dirtabs" id="dirtabs">
    <button class="dirtab t-stampa" data-theme="stampa"><span class="dt-n">Stampa</span><span class="dt-d">fumetto pop</span></button>
    <button class="dirtab t-adesivi" data-theme="adesivi"><span class="dt-n">Adesivi</span><span class="dt-d">riso sticker</span></button>
  </div>
</div>
<div id="stage"></div>

<script src="coppie/engine.js"></script>
<script src="coppie/mascots.js"></script>
<script src="coppie/themes.js"></script>
<script>
(function(){
  const stage = document.getElementById("stage");
  const KEY = "zodiac_coppie_lab";
  const DEF = { a:"cancro", b:"scorpione", lens:"amore", theme:"stampa" };
  let state = Object.assign({}, DEF);
  try{ const s = JSON.parse(localStorage.getItem(KEY)); if(s) state = Object.assign(state, s); }catch(e){}
  if(state.theme!=="stampa" && state.theme!=="adesivi") state.theme="stampa";
  const persist = ()=>{ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){} };

  function syncSelects(){ const A=stage.querySelector("#selA"),B=stage.querySelector("#selB"); if(A)A.value=state.a; if(B)B.value=state.b; }
  function syncLens(){ stage.querySelectorAll(".cl-lens-tab").forEach(t=>t.classList.toggle("active",t.dataset.lens===state.lens)); }
  function syncDirTabs(){ document.querySelectorAll(".dirtab").forEach(t=>t.classList.toggle("active",t.dataset.theme===state.theme)); }

  const api = {
    setPair(a,b){ state.a=a; state.b=b; persist(); syncSelects(); window.THEMES.renderResult(state.theme,state); },
    setLens(l){ state.lens=l; persist(); syncLens(); window.THEMES.renderResult(state.theme,state); },
    randomize(){
      const ks = window.ZODIAC.SIGNS.map(s=>s.k);
      let a=ks[Math.floor(Math.random()*ks.length)], b;
      do{ b=ks[Math.floor(Math.random()*ks.length)]; }while(b===a);
      api.setPair(a,b);
    }
  };

  function mountTheme(){ syncDirTabs(); window.THEMES.mount(stage, state, api); }

  document.querySelectorAll(".dirtab").forEach(t=>{
    t.addEventListener("click", ()=>{ state.theme=t.dataset.theme; persist(); mountTheme(); });
  });

  mountTheme();
})();
</script>
</body>
</html>
